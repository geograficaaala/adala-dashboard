<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atitlán Recicla - Generador de Informes</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root{
      --brand:#1f4d3d;
      --brand-2:#2f6e56;
      --accent:#d8e9df;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#d1d5db;
      --paper:#ffffff;
      --bg:#f5f7f6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--ink);
    }
    .topbar{
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#fff;
      padding:18px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }
    .topbar h1{
      margin:0;
      font-size:22px;
      font-weight:700;
    }
    .topbar .sub{
      opacity:.9;
      font-size:13px;
      margin-top:4px;
    }
    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .btn{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
    }
    .btn-primary{ background:#fff; color:var(--brand); }
    .btn-secondary{ background:#ecf4f0; color:var(--brand); }
    .btn-outline{
      background:transparent;
      border:1px solid rgba(255,255,255,.45);
      color:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
    }

    .layout{
      display:grid;
      grid-template-columns: 360px minmax(0,1fr);
      gap:20px;
      padding:20px;
      align-items:start;
    }
    .panel{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:18px;
      box-shadow:0 8px 18px rgba(0,0,0,.04);
    }
    .panel h2{
      margin:0 0 14px 0;
      font-size:18px;
    }
    .field{
      margin-bottom:14px;
    }
    .field label{
      display:block;
      font-size:13px;
      color:#374151;
      margin-bottom:6px;
      font-weight:700;
    }
    .field select,
    .field input,
    .field textarea{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
    }
    .field textarea{
      min-height:110px;
      resize:vertical;
    }
    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }
    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    .preview-wrap{
      min-width:0;
    }
    .preview-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }
    .preview-toolbar h2{
      margin:0;
      font-size:18px;
    }
    .preview-paper{
      background:#cfd8d3;
      padding:24px;
      border-radius:16px;
      overflow:auto;
      min-height:70vh;
    }

    /* Documento */
    #reportPreview.report-doc{
      width:816px;
      min-height:1056px;
      margin:0 auto;
      background:var(--paper);
      color:#111827;
      box-shadow:0 12px 30px rgba(0,0,0,.12);
      padding:60px 64px;
      font-family:"Times New Roman", Times, serif;
      font-size:12pt;
      line-height:1.15;
    }
    .report-doc .doc-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:18px;
      margin-bottom:18px;
    }
    .report-doc .doc-header img.logo{
      width:260px;
      height:auto;
      object-fit:contain;
      display:block;
    }
    .report-doc .doc-title{
      text-align:center;
      font-weight:700;
      text-transform:uppercase;
      margin:20px 0 18px;
      font-size:12pt;
    }
    .report-doc p{
      margin:0 0 9pt 0;
      text-align:justify;
    }
    .report-doc .section-title{
      font-weight:700;
      text-transform:uppercase;
      margin:14pt 0 8pt;
      text-align:left;
    }
    .report-doc .small-gap{ margin-top:8pt; }
    .report-doc .signature-block{
      margin-top:28pt;
    }
    .report-doc table{
      width:100%;
      border-collapse:collapse;
      margin:10pt 0 14pt;
      font-size:11pt;
    }
    .report-doc th,
    .report-doc td{
      border:1px solid #444;
      padding:6px 7px;
      vertical-align:top;
    }
    .report-doc th{
      background:#f3f4f6;
      text-align:center;
      font-weight:700;
    }
    .report-doc .chart-block{
      margin:14pt 0 14pt;
      text-align:center;
      page-break-inside:avoid;
    }
    .report-doc .chart-title{
      font-weight:700;
      margin-bottom:8pt;
      text-align:center;
    }
    .report-doc canvas{
      max-width:100%;
      background:#fff;
    }
    .report-doc .page-break{
      break-before:page;
      page-break-before:always;
      height:0;
    }
    .report-doc ul{
      margin:0 0 10pt 18pt;
      padding:0;
    }
    .report-doc li{
      margin:0 0 4pt 0;
      text-align:justify;
    }

    @media (max-width: 1200px){
      .layout{ grid-template-columns: 1fr; }
      #reportPreview.report-doc{ width:100%; min-height:auto; padding:36px; }
    }

    @media print{
      body{ background:#fff; }
      .topbar, .panel, .preview-toolbar{ display:none !important; }
      .layout{ display:block; padding:0; }
      .preview-wrap{ width:100%; }
      .preview-paper{ padding:0; background:#fff; }
      #reportPreview.report-doc{
        width:100%;
        box-shadow:none;
        margin:0;
        padding:1.8cm 1.8cm;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Generador de informes · Atitlán Recicla</h1>
      <div class="sub">Vista previa con logos, tablas y gráficas. Sin fotografías.</div>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-outline" href="./index_atitlanrecicla.html">← Volver al módulo</a>
    </div>
  </header>

  <main class="layout">
    <aside class="panel">
      <h2>Configuración</h2>

      <div class="field">
        <label for="reportType">Tipo de informe</label>
        <select id="reportType">
          <option value="gerencia">Informe mensual de gerencia</option>
          <option value="memoria">Memoria de reunión de avances</option>
        </select>
      </div>

      <div class="field">
        <label for="monthSelect">Período</label>
        <select id="monthSelect"></select>
        <div class="hint">Se llena desde <code>docs/data/total_mes.csv</code></div>
      </div>

      <div class="field">
        <label for="placeInput">Lugar</label>
        <input id="placeInput" type="text" value="Panajachel, Sololá" />
      </div>

      <div class="field">
        <label for="meetingDateInput">Fecha del documento</label>
        <input id="meetingDateInput" type="date" />
      </div>

      <div class="field">
        <label for="meetingTimeInput">Hora</label>
        <input id="meetingTimeInput" type="text" value="09:00 horas" />
      </div>

      <div class="field">
        <label for="responsableInput">Responsable</label>
        <input id="responsableInput" type="text" value="Equipo Atitlán Recicla" />
      </div>

      <div class="field">
        <label for="summaryInput">Interpretación / texto base</label>
        <textarea id="summaryInput">Durante el período reportado, Atitlán Recicla continuó con las acciones de recuperación y comercialización de materiales reciclables en los territorios priorizados, manteniendo la participación de lideresas, la recuperación de PET y vidrio, y la generación de ingresos en el territorio. El presente informe resume los principales resultados cuantitativos del mes, así como una lectura ejecutiva de su comportamiento con base en los datos consolidados del dashboard.</textarea>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="btnRefresh">Actualizar vista previa</button>
        <button class="btn btn-secondary" id="btnWord">Descargar Word</button>
        <button class="btn btn-secondary" id="btnPdf">Guardar PDF</button>
      </div>

      <div class="hint" style="margin-top:12px;">
        Importante: para que el logo cargue, guárdalo como <code>docs/logosatitlan.png</code>.
      </div>
    </aside>

    <section class="preview-wrap">
      <div class="preview-toolbar">
        <h2>Vista previa</h2>
      </div>
      <div class="preview-paper">
        <div id="reportPreview" class="report-doc"></div>
      </div>
    </section>
  </main>

  <script src="./atitlan_reportes.js"></script>
</body>
</html>
