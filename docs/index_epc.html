<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EPC · Dashboard</title>
  <meta name="description" content="Dashboard de Educando para Conservar">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root{
      --bg:#eef4fc;
      --card:#ffffff;
      --line:#d6e3f3;
      --text:#0c1d3a;
      --muted:#6582a8;
      --blue:#1a56a8;
      --sky:#38b6e8;
      --green:#157a50;
      --yellow:#8a6500;
      --red:#9d1b1b;
      --gray:#6b7280;
      --shadow:0 8px 24px rgba(10,35,80,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:linear-gradient(180deg,#eaf2fb 0%, #f4f8fd 100%);
      color:var(--text);
    }
    .wrap{max-width:1200px;margin:0 auto;padding:28px}
    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:28px;
      margin-bottom:22px;
    }
    .eyebrow{
      font-size:.8rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--blue);
      margin-bottom:8px;
    }
    h1{margin:0 0 8px 0;font-size:2rem}
    .sub{color:var(--muted);margin:0}
    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin:18px 0 0;
    }
    select{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;
      margin-bottom:22px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .kpi-title{font-size:.92rem;color:var(--muted);margin-bottom:8px}
    .kpi-value{font-size:2rem;font-weight:800}
    .kpi-meta{font-size:.9rem;color:var(--muted);margin-top:8px}
    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:.8rem;
      font-weight:700;
      margin-top:10px;
    }
    .verde{background:#e9f8ef;color:var(--green)}
    .amarillo{background:#fff6dc;color:var(--yellow)}
    .rojo{background:#fdecec;color:var(--red)}
    .gris{background:#eef2f7;color:var(--gray)}
    .azul{background:#e8f2ff;color:var(--blue)}

    table{
      width:100%;
      border-collapse:collapse;
      font-size:.94rem;
    }
    th,td{
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }
    th{color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em}
    .small{font-size:.84rem;color:var(--muted)}
    .section-title{margin:0 0 14px;font-size:1.1rem}
    .note{
      white-space:pre-wrap;
      line-height:1.55;
      color:#29476f;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 640px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">AALA · EPC</div>
      <h1>Educando para Conservar</h1>
      <p class="sub">Dashboard mensual basado en cierre oficial de indicadores 08A.</p>
      <div class="toolbar">
        <select id="periodSelect"></select>
      </div>
    </section>

    <section class="grid" id="kpiGrid"></section>

    <section class="card" style="margin-bottom:22px">
      <h2 class="section-title">Indicadores del período</h2>
      <table>
        <thead>
          <tr>
            <th>Indicador</th>
            <th>Valor mes</th>
            <th>Acumulado</th>
            <th>Meta anual</th>
            <th>Esperado al corte</th>
            <th>% meta anual</th>
            <th>% vs esperado</th>
            <th>Estatus</th>
          </tr>
        </thead>
        <tbody id="indicatorTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h2 class="section-title">Narrativa del cierre</h2>
      <div id="notesBox" class="note">Cargando...</div>
    </section>
  </div>

  <script src="./epc.js"></script>
</body>
</html>
