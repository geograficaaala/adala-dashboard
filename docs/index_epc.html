<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Educando para Conservar · AALA</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  --bg: #fdf8ee;
  --surface: #fef9f2;
  --card: #ffffff;
  --text: #1e1608;
  --text-2: #3d2e0a;
  --muted: #7a6840;
  --line: #e8d9b0;
  --line-soft: #f0e6c8;

  --accent: #7a4f00;
  --accent-mid: #a06800;
  --accent-light: #c8880a;
  --accent-soft: #f5e0a0;
  --accent-pale: #fdf5e0;

  --al-dia: #157a50;
  --al-dia-soft: #c5eed9;
  --al-dia-pale: #eafaf2;
  --seguimiento: #7a6200;
  --seguimiento-soft: #fef0c0;
  --seguimiento-pale: #fffbeb;
  --rezago: #8f1c1c;
  --rezago-soft: #fce8e8;
  --rezago-pale: #fff5f5;
  --inactivo: #6b6050;
  --inactivo-soft: #ede8de;

  --sh-sm: 0 1px 4px rgba(80,50,0,.05), 0 4px 16px rgba(80,50,0,.05);
  --sh-lg: 0 8px 40px rgba(80,50,0,.13), 0 2px 8px rgba(80,50,0,.05);
  --sh-hover: 0 16px 48px rgba(80,50,0,.15), 0 4px 12px rgba(80,50,0,.07);

  --radius: 18px; --radius-sm: 11px; --radius-xs: 7px;
  --font-head: 'Lora', Georgia, serif;
  --font-body: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { scroll-behavior: smooth }
body {
  font-family: var(--font-body);
  background: linear-gradient(160deg, #fdf0cc 0%, #fdf8ee 38%, #fef9f0 68%, #fffef8 100%) fixed;
  color: var(--text); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 0% -5%, rgba(160,104,0,.15) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 100% 110%, rgba(200,136,10,.10) 0%, transparent 50%);
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle 1px at 1px 1px, rgba(160,104,0,.05) 1px, transparent 0);
  background-size: 36px 36px;
}

/* TOPBAR */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(253,248,238,.94); backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border-bottom: 1px solid var(--line-soft);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 10px 28px;
}
.back {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,.85); border: 1px solid var(--line);
  text-decoration: none; color: var(--text-2); font-weight: 600; font-size: .82rem;
  transition: all .2s; white-space: nowrap;
}
.back:hover { background: var(--accent-pale); border-color: var(--accent-soft); color: var(--accent); transform: translateY(-1px) }
.back-arrow {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-soft); color: var(--accent); font-size: .78rem; font-weight: 700;
}
.month-pills {
  display: flex; gap: 4px; align-items: center;
  background: rgba(255,255,255,.6); border: 1px solid var(--line-soft);
  border-radius: 999px; padding: 4px 6px;
}
.month-pill {
  padding: 5px 13px; border-radius: 999px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: .77rem; font-weight: 700;
  color: var(--muted); background: transparent; transition: all .2s;
}
.month-pill:hover:not(:disabled) { color: var(--accent-mid); background: var(--accent-pale) }
.month-pill.active { background: linear-gradient(135deg,var(--accent),var(--accent-mid)); color: #fff; box-shadow: 0 2px 10px rgba(122,79,0,.35) }
.month-pill.planif { font-style: italic; border: 1px dashed var(--line) }
.month-pill.planif.active { background: rgba(122,79,0,.10); color: var(--accent); border: 1px dashed var(--accent-soft); box-shadow: none }
.month-pill:disabled { opacity: .3; cursor: default }
.topbar-right { margin-left: auto }
.estado-global {
  display: flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 999px;
  font-size: .78rem; font-weight: 700; white-space: nowrap; border: 1.5px solid transparent; transition: all .3s;
}
.estado-global .dot { width: 7px; height: 7px; border-radius: 50%; animation: blink 2.5s ease-in-out infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.estado-global.al-dia     { background:var(--al-dia-pale);     color:var(--al-dia);     border-color:rgba(21,122,80,.2) }
.estado-global.al-dia .dot     { background:var(--al-dia) }
.estado-global.seguimiento{ background:var(--seguimiento-pale); color:var(--seguimiento); border-color:rgba(122,98,0,.2) }
.estado-global.seguimiento .dot{ background:var(--seguimiento) }
.estado-global.rezago     { background:var(--rezago-pale);     color:var(--rezago);     border-color:rgba(143,28,28,.2) }
.estado-global.rezago .dot     { background:var(--rezago) }
.estado-global.inactivo   { background:var(--inactivo-soft);   color:var(--inactivo);   border-color:rgba(107,96,80,.2) }
.estado-global.inactivo .dot   { background:var(--inactivo) }

/* WRAP */
.wrap { max-width: 1340px; margin: 0 auto; padding: 28px 24px 80px; position: relative; z-index: 1 }

/* BANNER */
.banner-planif {
  background: var(--accent-pale); border: 1.5px solid var(--accent-soft);
  border-radius: var(--radius-sm); padding: 12px 18px; margin-bottom: 16px;
  font-size: .87rem; color: var(--text-2); line-height: 1.6;
}
.banner-planif strong { color: var(--accent) }

/* CARD */
.card {
  background: var(--card); border: 1.5px solid var(--line-soft); border-radius: var(--radius);
  box-shadow: var(--sh-sm); transition: transform .3s cubic-bezier(.25,.46,.45,.94), box-shadow .3s, border-color .2s;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--sh-hover); border-color: var(--accent-soft) }

/* HERO */
.hero { display: grid; grid-template-columns: 1.55fr 1fr; gap: 16px; margin-bottom: 20px }
.hero-main {
  padding: 34px 38px 30px;
  background: linear-gradient(135deg, #ffffff 0%, #fdf5e0 55%, #fae8b8 100%);
  position: relative; overflow: hidden;
}
.hero-main::before {
  content: ''; position: absolute; right: -80px; top: -80px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,136,10,.10) 0%, transparent 65%); pointer-events: none;
}
.eyebrow {
  font-size: .7rem; font-weight: 800; letter-spacing: .13em;
  text-transform: uppercase; color: var(--accent-mid); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.eyebrow::before {
  content: ''; display: block; width: 18px; height: 2px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent-mid)); border-radius: 2px;
}
.hero-main h1 {
  font-family: var(--font-head); font-size: clamp(1.8rem, 2.8vw, 2.5rem);
  line-height: 1.1; letter-spacing: -.02em; margin-bottom: 13px;
  background: linear-gradient(135deg, var(--text) 40%, var(--accent-mid) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-desc { font-size: .93rem; color: var(--text-2); line-height: 1.72; margin-bottom: 20px; max-width: 56ch }
.hero-pills { display: flex; gap: 8px; flex-wrap: wrap }
.hero-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 13px; border-radius: 999px;
  background: rgba(255,255,255,.75); border: 1.5px solid var(--line-soft);
  font-size: .78rem; font-weight: 600; color: var(--text-2); transition: all .2s;
}
.hero-pill:hover { background: var(--accent-pale); border-color: var(--accent-soft); color: var(--accent) }
.hero-pill strong { font-family: var(--font-mono); color: var(--accent-mid) }

/* HERO SIDE */
.hero-side {
  padding: 24px 22px;
  background: linear-gradient(160deg, #fdf0cc 0%, #f8e6a0 50%, #faf0cc 100%);
  display: flex; flex-direction: column; gap: 16px;
}
.side-label { font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--muted) }

/* Ciclo dots */
.ciclo-dots { display: flex; gap: 5px }
.ciclo-dot {
  flex: 1; height: 26px; border-radius: 5px;
  background: rgba(255,255,255,.45); border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: var(--muted); transition: all .35s;
}
.ciclo-dot.hecho { background: linear-gradient(135deg,var(--accent-light),var(--accent)); border-color: var(--accent); color: #fff }
.ciclo-dot.actual { background: rgba(200,136,10,.18); border-color: var(--accent-light); color: var(--accent); animation: cpulse 2s ease-in-out infinite }
@keyframes cpulse { 0%,100%{box-shadow:0 0 0 0 rgba(200,136,10,.25)} 50%{box-shadow:0 0 0 4px rgba(200,136,10,.10)} }
.ciclo-labels { display: flex; gap: 5px; font-size: .58rem; color: var(--muted); font-weight: 700 }
.ciclo-labels span { flex: 1; text-align: center }

/* Gauge */
.gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px }
.gauge-lbl { font-size: .67rem; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); text-align: center }
.gauge-track { fill: none; stroke: var(--line); stroke-width: 10; stroke-linecap: round }
.gauge-fill {
  fill: none; stroke: url(#gGrad); stroke-width: 10; stroke-linecap: round;
  stroke-dasharray: 251.2; stroke-dashoffset: 251.2;
  transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
  transform: rotate(-90deg); transform-origin: 50px 50px;
}
.g-val { font-family: var(--font-mono); font-size: 1.45rem; font-weight: 500; fill: var(--accent); text-anchor: middle; dominant-baseline: central }
.g-lbl { font-size: .58rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; fill: var(--muted); text-anchor: middle; dominant-baseline: central }
.side-note { font-size: .75rem; color: var(--muted); text-align: center; line-height: 1.5 }
.side-note strong { color: var(--accent-mid) }

/* LAYOUTS */
.grid-2    { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px }
.grid-2-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 16px }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 13px; margin-bottom: 20px }
.kpi-card {
  padding: 20px 18px 17px; border-top: 3px solid var(--line-soft);
  position: relative; overflow: hidden; cursor: zoom-in;
  transition: transform .25s cubic-bezier(.25,.46,.45,.94), box-shadow .25s, border-color .2s;
}
.kpi-card:hover { transform: translateY(-4px); box-shadow: var(--sh-lg) }
.kpi-card.al-dia     { border-top-color: var(--al-dia) }
.kpi-card.seguimiento{ border-top-color: var(--seguimiento) }
.kpi-card.rezago     { border-top-color: var(--rezago) }
.kpi-card.inactivo   { border-top-color: var(--inactivo) }
.kpi-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px }
.kpi-nombre { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); line-height: 1.35 }
.sem {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px;
  font-size: .63rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
}
.sem::before { content: '●'; font-size: .52em }
.sem.al-dia     { background:var(--al-dia-soft);   color:var(--al-dia) }
.sem.seguimiento{ background:var(--seguimiento-soft); color:var(--seguimiento) }
.sem.rezago     { background:var(--rezago-soft);    color:var(--rezago) }
.sem.inactivo   { background:var(--inactivo-soft);  color:var(--inactivo) }
.kpi-val {
  font-family: var(--font-mono); font-size: 2rem; font-weight: 500;
  line-height: 1; letter-spacing: -.03em; color: var(--text); margin-bottom: 3px;
}
.kpi-unit { font-size: .75rem; color: var(--muted); margin-bottom: 10px }
.kpi-ciclo { display: flex; gap: 3px; margin-bottom: 8px }
.kpi-cdot { flex: 1; height: 5px; border-radius: 999px; background: var(--line-soft); transition: background .4s }
.kpi-cdot.hecho  { background: linear-gradient(90deg,var(--accent-light),var(--accent)) }
.kpi-cdot.actual { background: var(--accent-soft); border: 1px solid var(--accent-light) }
.kpi-bar-wrap { position: relative; height: 6px; border-radius: 999px; background: var(--line-soft); overflow: hidden; margin-bottom: 8px }
.kpi-bar-esp  { position: absolute; left:0; top:0; height:100%; border-radius:999px; background: repeating-linear-gradient(90deg,var(--line) 0,var(--line) 4px,transparent 4px,transparent 8px) }
.kpi-bar-real { position: absolute; left:0; top:0; height:100%; border-radius:999px; background: linear-gradient(90deg,var(--accent-light),var(--accent)); transition: width .8s cubic-bezier(.4,0,.2,1) }
.kpi-bar-real.al-dia     { background: linear-gradient(90deg,#1d9e68,var(--al-dia)) }
.kpi-bar-real.seguimiento{ background: linear-gradient(90deg,#c8960a,var(--seguimiento)) }
.kpi-bar-real.rezago     { background: linear-gradient(90deg,#e05c5c,var(--rezago)) }
.kpi-foot { font-size: .72rem; color: var(--muted); display: flex; justify-content: space-between }
.kpi-foot strong { color: var(--text-2); font-weight: 600 }

/* PANEL */
.section { margin-bottom: 20px }
.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--line-soft) }
.section-title { font-family: var(--font-head); font-size: 1.18rem; font-weight: 600; color: var(--text); letter-spacing: -.01em }
.section-sub { font-size: .82rem; color: var(--muted); margin-top: 2px }
.panel { padding: 22px 24px }
.panel-accent { border-top: 3px solid var(--accent-mid) }
.panel h3 { font-family: var(--font-head); font-size: .98rem; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -.01em }
.panel-sub { font-size: .81rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5 }

/* DIPLOMADO */
.diplomado-wrap {
  background: linear-gradient(135deg, #fff9ec 0%, #fdf0c0 100%);
  border: 1.5px solid var(--accent-soft); border-radius: var(--radius); padding: 24px 26px;
}
.diplomado-titulo { font-family: var(--font-head); font-size: 1.05rem; font-weight: 600; color: var(--accent); margin-bottom: 3px }
.diplomado-sub { font-size: .79rem; color: var(--muted); margin-bottom: 16px }
.sesiones-track { display: flex; gap: 5px; margin-bottom: 5px }
.sesion-dot {
  flex: 1; height: 22px; border-radius: 4px; background: rgba(255,255,255,.5); border: 1.5px solid var(--line);
  display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 700; color: var(--muted); transition: all .3s;
}
.sesion-dot.hecha { background: linear-gradient(135deg,var(--accent-light),var(--accent)); border-color: var(--accent); color: #fff }
.sesion-dot.pendiente { opacity: .45 }
.sesiones-labels { display: flex; gap: 5px; font-size: .56rem; color: var(--muted); font-weight: 700; margin-bottom: 16px }
.sesiones-labels span { flex: 1; text-align: center }
.dipl-metricas { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px }
.dipl-met { padding: 11px 13px; border-radius: var(--radius-sm); text-align: center; background: rgba(255,255,255,.75); border: 1.5px solid var(--accent-soft) }
.dipl-met-val { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 500; color: var(--accent); line-height: 1 }
.dipl-met-lbl { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 4px }
.ret-row { display: flex; align-items: center; gap: 10px; padding: 10px 13px; border-radius: var(--radius-sm); background: rgba(255,255,255,.6); border: 1.5px solid var(--line-soft); margin-bottom: 6px }
.ret-lbl { font-size: .77rem; color: var(--text-2); flex: 1; min-width: 0 }
.ret-bar-wrap { flex: 1.4; height: 7px; border-radius: 999px; background: var(--line-soft); overflow: hidden; flex-shrink: 0 }
.ret-bar { height: 100%; border-radius: 999px; transition: width 1s cubic-bezier(.4,0,.2,1) }
.ret-val { font-family: var(--font-mono); font-size: .81rem; font-weight: 500; min-width: 58px; text-align: right; flex-shrink: 0 }
.ret-nota { font-size: .73rem; color: var(--muted); margin-top: 8px; line-height: 1.55 }

/* ACTIVIDADES */
.act-list { display: grid; gap: 7px }
.act-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 9px 13px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1.5px solid var(--line-soft); transition: all .2s;
}
.act-row:hover { background: var(--accent-pale); border-color: var(--accent-soft) }
.act-nombre { font-size: .84rem; font-weight: 600; color: var(--text-2) }
.act-count { font-family: var(--font-mono); font-size: .88rem; font-weight: 500; color: var(--accent); background: var(--accent-pale); padding: 2px 10px; border-radius: 999px; flex-shrink: 0 }

/* CHART */
.chart-host { cursor: zoom-in }
.chart-host:hover { outline: 2px solid var(--accent-soft); border-radius: var(--radius-sm) }

/* REGISTRO */
.logros-txt { font-size: .9rem; color: var(--text-2); line-height: 1.75; border-left: 3px solid var(--accent-light); padding-left: 16px; margin-bottom: 12px }
.alertas-nota { padding: 10px 14px; border-radius: var(--radius-sm); background: var(--seguimiento-pale); border-left: 3px solid var(--seguimiento); font-size: .83rem; color: #5a3e00; line-height: 1.6 }

/* ALERTAS */
.alertas-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-top: 4px }
.alerta { padding: 11px 14px; border-radius: var(--radius-sm); border-left: 3px solid; font-size: .85rem; line-height: 1.6 }
.alerta strong { font-weight: 600 }
.alerta.al-dia     { background:var(--al-dia-pale);     border-color:var(--al-dia);     color:#0d4d32 }
.alerta.seguimiento{ background:var(--seguimiento-pale); border-color:var(--seguimiento); color:#5a3e00 }
.alerta.rezago     { background:var(--rezago-pale);     border-color:var(--rezago);     color:#5c1212 }
.alerta.inactivo   { background:var(--inactivo-soft);   border-color:var(--inactivo);   color:#3a3028 }
@media (max-width: 700px) { .alertas-grid { grid-template-columns: 1fr } }

/* TABLA */
.tbl-wrap { overflow: auto; border-radius: var(--radius-sm); border: 1.5px solid var(--line-soft) }
table { width: 100%; border-collapse: collapse; font-size: .81rem }
th { background:var(--surface); color:var(--accent-mid); font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; padding:9px 12px; border-bottom:2px solid var(--line); text-align:left; white-space:nowrap; position:sticky; top:0 }
td { padding:9px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle; white-space:nowrap }
tr:last-child td { border-bottom: none }
tbody tr { transition: background .15s }
tbody tr:hover td { background: var(--accent-pale) }
td.num { font-family: var(--font-mono); text-align: right }
td.nom { font-weight: 600; color: var(--text-2) }

/* DIVIDER */
.divider {
  display: flex; align-items: center; gap: 14px; margin: 24px 0 16px;
  color: var(--accent-mid); font-size: .67rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em;
}
.divider::before, .divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--line),transparent) }

/* TOOLTIP */
.tooltip {
  position: fixed; z-index: 999; background: rgba(30,22,8,.92); color: #fff;
  padding: 9px 13px; border-radius: var(--radius-sm); font-size: .8rem; line-height: 1.55;
  pointer-events: none; opacity: 0; transition: opacity .15s; max-width: 230px;
  backdrop-filter: blur(6px); box-shadow: var(--sh-lg);
}
.tooltip.visible { opacity: 1 }
.tooltip strong { color: #fcd87a }
.t-sem { font-size: .67rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-top: 2px }
.t-sem.al-dia { color: #6ee7b7 } .t-sem.seguimiento { color: #fcd34d } .t-sem.rezago { color: #fca5a5 }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500; background: rgba(20,14,2,.58);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  opacity: 0; pointer-events: none; transition: opacity .28s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open { opacity: 1; pointer-events: all }
.modal-box {
  background: var(--card); border-radius: var(--radius); box-shadow: 0 32px 80px rgba(20,14,2,.32);
  width: 100%; max-width: 740px; max-height: 88vh; overflow: hidden;
  display: flex; flex-direction: column;
  transform: scale(.94) translateY(12px); transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal-box { transform: scale(1) translateY(0) }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:17px 24px 13px; border-bottom:1px solid var(--line-soft); flex-shrink:0 }
.modal-title { font-family: var(--font-head); font-size: 1.08rem; font-weight: 600; color: var(--text) }
.modal-sub { font-size: .81rem; color: var(--muted); margin-top: 2px }
.modal-close { width:30px; height:30px; border-radius:50%; border:none; background:var(--surface); color:var(--muted); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s }
.modal-close:hover { background:var(--rezago-soft); color:var(--rezago) }
.modal-body { padding: 22px 24px; overflow-y: auto; flex: 1 }
.modal-val-big { font-family: var(--font-mono); font-size: 3.2rem; font-weight: 500; line-height: 1; letter-spacing: -.04em; color: var(--text) }
.modal-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px }
.modal-stat { padding:12px 14px; border-radius:var(--radius-sm); background:var(--surface); border:1.5px solid var(--line-soft); text-align:center }
.modal-stat-val { font-family:var(--font-mono); font-size:1.25rem; color:var(--text); font-weight:500 }
.modal-stat-lbl { font-size:.66rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-top:3px }
.modal-bar-wrap { height:10px; border-radius:999px; background:var(--line-soft); overflow:hidden; margin:14px 0 9px; position:relative }
.modal-bar-esp { position:absolute; left:0; top:0; height:100%; border-radius:999px; background:repeating-linear-gradient(90deg,var(--line) 0,var(--line) 4px,transparent 4px,transparent 8px) }
.modal-bar-real { position:absolute; left:0; top:0; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--accent-light),var(--accent)); transition:width 1s cubic-bezier(.4,0,.2,1) }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px; color:var(--muted) }
.spinner { width:30px; height:30px; border-radius:50%; border:3px solid var(--line); border-top-color:var(--accent-mid); animation:spin 1s linear infinite }
@keyframes spin { to { transform: rotate(360deg) } }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
.s1{animation:fadeUp .45s .05s ease both} .s2{animation:fadeUp .45s .12s ease both}
.s3{animation:fadeUp .45s .19s ease both} .s4{animation:fadeUp .45s .26s ease both}
.s5{animation:fadeUp .45s .33s ease both} .s6{animation:fadeUp .45s .40s ease both}

@media (max-width:1100px) {
  .hero,.grid-2{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2-eq{grid-template-columns:1fr}
}
@media (max-width:700px) {
  .wrap{padding:16px 14px 60px}
  .hero-main{padding:22px 18px 20px}
  .topbar{padding:8px 14px}
  .kpi-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="tooltip" class="tooltip"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">&#8212;</div>
        <div class="modal-sub" id="modalSub">&#8212;</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<nav class="topbar">
  <a href="./index.html" class="back">
    <span class="back-arrow">&#8592;</span>
    Volver al inicio
  </a>
  <div class="month-pills" id="monthPills" role="group" aria-label="Período"></div>
  <div class="topbar-right">
    <div class="estado-global inactivo" id="estadoGlobal">
      <span class="dot"></span>
      <span id="estadoLabel">Cargando</span>
    </div>
  </div>
</nav>

<main class="wrap" id="mainWrap">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <span>Cargando datos del programa</span>
  </div>
</main>

<script>
const PATHS = {
  total:       './data/educando_para_conservar/total_mes.csv',
  indicadores: './data/educando_para_conservar/institucional_indicadores.csv',
};

/* Datos del diplomado: las dos sesiones de marzo son 69 y 53 asistentes.
   El CSV registra 122 = 69+53 acumulado del mes. Aquí los separamos. */
const DIPL_CONFIG = {
  META_COBERTURA: 60,
  TOTAL_SESIONES: 6,
  LABELS_SESIONES: ['6 mar','20 mar','10 abr','15 may','29 may','12 jun'],
  POR_PERIODO: {
    '2026-02': { inscritos: 68, sesiones: [] },
    '2026-03': {
      inscritos: 68,
      sesiones: [
        { label: 'Módulo 1 · 6 mar',  n: 69 },
        { label: 'Módulo 2 · 20 mar', n: 53 },
      ]
    }
  }
};

let state = { periodo: '', data: {} };

const fmt    = (n, d=0) => new Intl.NumberFormat('es-GT',{maximumFractionDigits:d,minimumFractionDigits:d}).format(+n||0);
const esc    = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isTrue = v => String(v||'').toLowerCase()==='true';

function parseCsv(url){
  return new Promise((res,rej)=>Papa.parse(url,{
    download:true,header:true,skipEmptyLines:'greedy',
    complete:r=>res((r.data||[]).map(row=>{
      const o={};
      for(const k of Object.keys(row)){
        const v=row[k];
        const n=Number(String(v).replace(/,/g,''));
        o[k]=(v!==''&&!isNaN(n))?n:v;
      }
      return o;
    })),
    error:rej
  }));
}

function semCls(estatus, esExigible){
  const e=String(estatus||'').toLowerCase();
  if(e==='verde')    return 'al-dia';
  if(e==='amarillo') return 'seguimiento';
  if(e==='rojo')     return isTrue(esExigible)?'rezago':'inactivo';
  return 'inactivo';
}
function semLbl(cls){
  return {'al-dia':'Al día','seguimiento':'En seguimiento','rezago':'Rezago','inactivo':'Inactivo en este corte'}[cls]||'Inactivo en este corte';
}

function animCounter(el, to, dur=420){
  const s=performance.now();
  (function step(now){
    const p=Math.min((now-s)/dur,1);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    el.textContent=fmt(to*e,to%1===0?0:1);
    if(p<1) requestAnimationFrame(step);
    else el.textContent=fmt(to,to%1===0?0:1);
  })(performance.now());
}

function setGauge(pct){
  const el=document.getElementById('gaugeFill');
  if(el) el.style.strokeDashoffset=251.2-Math.min(+pct,1)*251.2;
  const v=document.getElementById('gaugeVal');
  if(v) v.textContent=fmt(+pct*100,0)+'%';
}

const tip=document.getElementById('tooltip');
function showTip(e,html){ tip.innerHTML=html; tip.classList.add('visible'); moveTip(e) }
function moveTip(e){ tip.style.left=Math.min(e.clientX+14,window.innerWidth-240)+'px'; tip.style.top=Math.min(e.clientY-10,window.innerHeight-100)+'px' }
function hideTip(){ tip.classList.remove('visible') }
document.addEventListener('mousemove',e=>{ if(tip.classList.contains('visible')) moveTip(e) });

async function init(){
  try{
    const [total,indicadores]=await Promise.all(Object.values(PATHS).map(parseCsv));
    state.data={total,indicadores};
    const periodos=[...new Set(total.filter(r=>isTrue(r.tiene_datos_mes)).map(r=>r.periodo_clave))].sort();
    state.periodo=periodos[periodos.length-1];
    buildPills(total);
    renderAll();
    document.getElementById('loadingState')?.remove();
  }catch(err){
    console.error(err);
    document.getElementById('mainWrap').innerHTML=
      `<div class="loading"><p>Error al cargar. Verifica <code>./data/educando_para_conservar/</code></p></div>`;
  }
}

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function buildPills(total){
  const c=document.getElementById('monthPills');
  c.innerHTML='';
  ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06',
   '2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'].forEach(p=>{
    const row=total.find(r=>r.periodo_clave===p);
    const hasData=row&&isTrue(row.tiene_datos_mes);
    const aporta=row&&isTrue(row.aporta_metas_epc);
    const btn=document.createElement('button');
    btn.textContent=MESES[+p.split('-')[1]-1];
    btn.disabled=!hasData;
    btn.className='month-pill'+(!aporta&&hasData?' planif':'')+(p===state.periodo?' active':'');
    if(hasData){ btn.onclick=()=>{ state.periodo=p; document.querySelectorAll('.month-pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderAll() } }
    c.appendChild(btn);
  });
}

function renderAll(){
  const {total,indicadores}=state.data;
  const p=state.periodo;
  const totRow=total.find(r=>r.periodo_clave===p)||{};
  const aporta=isTrue(totRow.aporta_metas_epc);
  const mesCiclo=+totRow.mes_ciclo_epc||0;

  const inds=indicadores.filter(r=>r.periodo_clave===p);
  const indsEst=inds.filter(r=>r.categoria==='estrategico').sort((a,b)=>(+a.orden_dashboard||99)-(+b.orden_dashboard||99));
  const indsTact=inds.filter(r=>r.categoria==='tactico').sort((a,b)=>(+a.orden_dashboard||99)-(+b.orden_dashboard||99));

  let estadoCls='inactivo';
  if(aporta){
    const activos=indsEst.filter(r=>r.estatus&&r.estatus!=='gris');
    if(activos.length){
      if(activos.some(r=>semCls(r.estatus,r.es_exigible)==='rezago'))      estadoCls='rezago';
      else if(activos.some(r=>semCls(r.estatus,r.es_exigible)==='seguimiento')) estadoCls='seguimiento';
      else estadoCls='al-dia';
    }
  }
  const eEl=document.getElementById('estadoGlobal');
  eEl.className='estado-global '+estadoCls;
  document.getElementById('estadoLabel').textContent=semLbl(estadoCls);

  setTimeout(()=>setGauge(mesCiclo/8),100);
  document.getElementById('mainWrap').innerHTML=buildHTML(totRow,inds,indsEst,indsTact,p,aporta,mesCiclo);
  setTimeout(()=>{ document.querySelectorAll('.kpi-val[data-to]').forEach(el=>animCounter(el,+el.dataset.to)) },160);
  attachEvents();
}

function buildHTML(tot,inds,indsEst,indsTact,p,aporta,mesCiclo){
  const mesIdx=+p.split('-')[1]-1;
  const mesLbl=MESES[mesIdx]+' '+p.split('-')[0];

  const banner=!aporta?`<div class="banner-planif">
    <strong>${MESES[mesIdx]}</strong> es un mes de planificación. No aporta a los indicadores del ciclo EPC (marzo–octubre).
  </div>`:'';

  const NARR={
    '2026-01':'Enero se destinó a la revisión del POA EPC 2026, ajuste de estrategia pedagógica y generación de cronogramas y herramientas para el Diplomado Juvenil. Se realizó una jornada de siembra de tul en Panajachel previa al inicio del ciclo escolar.',
    '2026-02':`Febrero se concentró en la preparación de los centros EPC. Se realizaron ${fmt(+tot.centros_induccion_mes||0)} talleres de inducción con ${fmt(+tot.docentes_induccion_mes||0)} docentes y diagnóstico inicial a ${fmt(+tot.estudiantes_diagnostico_mes||0)} estudiantes. Se consolidó la inscripción de ${fmt(68)} participantes para el Diplomado Juvenil.`,
    '2026-03':`El módulo 1 del ciclo EPC se implementó en los ${fmt(+tot.centros_mes||0)} centros educativos con ${fmt(+tot.docentes_mes||0)} docentes y ${fmt(+tot.estudiantes_epc_mes||0)} estudiantes en ${fmt(+tot.municipios_mes||0)} municipios. El Diplomado Juvenil completó sus dos primeras sesiones.`,
  };
  const desc=NARR[p]||`Seguimiento del período ${mesLbl} · Programa Educando para Conservar.`;

  const heroStats=aporta?[
    {lbl:'Docentes',    val:fmt(+tot.docentes_mes||0)},
    {lbl:'Estudiantes', val:fmt(+tot.estudiantes_epc_mes||0)},
    {lbl:'Centros',     val:fmt(+tot.centros_mes||0)},
    {lbl:'Municipios',  val:fmt(+tot.municipios_mes||0)},
  ]:[
    {lbl:'Centros inductados',  val:fmt(+tot.centros_induccion_mes||0)},
    {lbl:'Docentes inductados', val:fmt(+tot.docentes_induccion_mes||0)},
    {lbl:'Coordinaciones',      val:fmt(+tot.coordinaciones_clave_mes||0)},
  ];

  const MC=['Mar','Abr','May','Jun','Jul','Ago','Sep','Oct'];
  const trackDots=MC.map((m,i)=>`<div class="ciclo-dot ${i<mesCiclo?'hecho':(i===mesCiclo&&aporta?'actual':'')}">
    ${i<mesCiclo?'&#10003;':''}</div>`).join('');
  const trackLbls=MC.map(m=>`<span>${m}</span>`).join('');

  const kpiHTML=indsEst.slice(0,4).map(ind=>buildKpiCard(ind,mesCiclo,aporta,mesIdx)).join('');
  const diplHTML=buildDiplomado(p);

  const actItems=[
    {nom:'Manejo y poda de tul',            val:+tot.act_tul_mes||0},
    {nom:'Campañas de reforestación',        val:+tot.act_reforestacion_mes||0},
    {nom:'Ferias ambientales',               val:+tot.act_ferias_mes||0},
    {nom:'Giras educativas',                 val:+tot.act_giras_mes||0},
    {nom:'Huertos escolares',                val:+tot.act_huertos_mes||0},
    {nom:'Campañas de limpieza escolar',     val:+tot.act_limpiezas_mes||0},
    {nom:'Murales pedagógicos',              val:+tot.act_murales_mes||0},
    {nom:'Centros de acopio escolar',        val:+tot.act_centros_acopio_mes||0},
  ].filter(a=>a.val>0);

  const actHTML=actItems.length
    ?`<div class="act-list">${actItems.map(a=>`<div class="act-row"><span class="act-nombre">${esc(a.nom)}</span><span class="act-count">${fmt(a.val)}</span></div>`).join('')}</div>
      ${+tot.estudiantes_actividades_campo_mes>0?`<p style="font-size:.77rem;color:var(--muted);margin-top:8px">${fmt(+tot.estudiantes_actividades_campo_mes)} estudiantes participaron en actividades de campo.</p>`:''}`
    :`<p style="font-size:.82rem;color:var(--inactivo)">Sin actividades de campo en este período.</p>`;

  const logros=String(tot.logros_texto||'').trim();
  const alertaTxt=String(tot.alertas_texto||'').trim();

  return `
${banner}
<section class="hero s1">
  <article class="card hero-main">
    <div class="eyebrow">Programa Educando para Conservar · AALA</div>
    <h1>Educación ambiental en el ciclo escolar del lago</h1>
    <p class="hero-desc">${esc(desc)}</p>
    <div class="hero-pills">
      <span class="hero-pill">Corte <strong>${mesLbl}</strong></span>
      ${heroStats.map(s=>`<span class="hero-pill"><strong>${s.val}</strong> ${esc(s.lbl)}</span>`).join('')}
    </div>
  </article>
  <aside class="card hero-side s2">
    <div class="side-label">Ciclo EPC 2026</div>
    <div class="ciclo-dots">${trackDots}</div>
    <div class="ciclo-labels">${trackLbls}</div>
    <div class="gauge-wrap">
      <div class="gauge-lbl">Meses del ciclo cumplidos</div>
      <svg width="108" height="108" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#c8880a"/>
            <stop offset="100%" stop-color="#7a4f00"/>
          </linearGradient>
        </defs>
        <circle class="gauge-track" cx="50" cy="50" r="40"/>
        <circle class="gauge-fill" id="gaugeFill" cx="50" cy="50" r="40"/>
        <text class="g-val" id="gaugeVal" x="50" y="44">0%</text>
        <text class="g-lbl" x="50" y="60">del ciclo</text>
      </svg>
    </div>
    <p class="side-note"><strong>${mesCiclo}</strong> de 8 meses activos · ${aporta?'Ciclo en curso':'Ciclo no iniciado'}</p>
  </aside>
</section>

<section class="section s3">
  <div class="section-head">
    <div>
      <div class="section-title">Indicadores estratégicos</div>
      <div class="section-sub">Meses del ciclo cumplidos por indicador · ${mesLbl}</div>
    </div>
  </div>
  <div class="kpi-grid">${kpiHTML}</div>
</section>

<div class="divider s4">Actividad del período</div>
<section class="section s4">
  <div class="grid-2">
    ${diplHTML}
    <article class="card panel">
      <h3>Actividades de campo</h3>
      <p class="panel-sub">Actividades realizadas en territorio · ${mesLbl}.</p>
      ${actHTML}
    </article>
  </div>
</section>

<div class="divider s5">Indicadores tácticos acumulados</div>
<section class="section s5">
  <div class="grid-2">
    <article class="card panel panel-accent">
      <h3>Avance acumulado vs meta anual</h3>
      <p class="panel-sub">Actividades tácticas. Línea punteada = ritmo esperado al corte.</p>
      <div class="chart-host" id="grafTact">${buildGrafTact(indsTact)}</div>
    </article>
    <article class="card panel">
      <h3>Todos los indicadores al corte</h3>
      <p class="panel-sub">Estratégicos y tácticos · ${mesLbl}.</p>
      <div class="tbl-wrap">${buildTabla(indsEst,indsTact)}</div>
    </article>
  </div>
</section>

<div class="divider s6">Registro del período</div>
<section class="section s6">
  ${logros?`<article class="card panel" style="margin-bottom:16px">
    <h3>Registro · ${mesLbl}</h3>
    <p class="panel-sub">Según informe mensual del programa.</p>
    <div class="logros-txt">${esc(logros)}</div>
    ${alertaTxt?`<div class="alertas-nota">${esc(alertaTxt)}</div>`:''}
  </article>`:''}
  <article class="card panel">
    <h3>Estado de los indicadores</h3>
    <p class="panel-sub">Señales clave en ${mesLbl}.</p>
    <div class="alertas-grid">${buildAlertas(indsEst,aporta)}</div>
  </article>
</section>`;
}

function buildKpiCard(ind, mesCiclo, aporta, mesIdx){
  const cls=semCls(ind.estatus,ind.es_exigible);
  const lbl=semLbl(cls);
  const modelo=ind.modelo_medicion||'';

  if(modelo==='monthly_recurrent'){
    const mesesC=+ind.meses_cumplidos||0;
    const valMes=+ind.valor_mes||0;
    const metaMes=+ind.meta_mes||0;
    const dots=Array.from({length:8},(_,i)=>`<div class="kpi-cdot ${i<mesesC?'hecho':(i===mesesC&&aporta?'actual':'')}"></div>`).join('');
    return `<article class="card kpi-card ${cls}" onclick="openKpiModal(${JSON.stringify({nombre:ind.indicador_nombre,val:valMes,metaMes,mesesC,unidad:ind.unidad||'',cls,lbl,modelo,mesIdx})})">
      <div class="kpi-top"><div class="kpi-nombre">${esc(ind.indicador_nombre)}</div><span class="sem ${cls}">${lbl}</span></div>
      <div class="kpi-val" data-to="${valMes}">${fmt(valMes)}</div>
      <div class="kpi-unit">${esc(ind.unidad||'')} este mes</div>
      <div class="kpi-ciclo">${dots}</div>
      <div class="kpi-foot"><span>Ciclo: <strong>${mesesC}/8</strong> meses</span><span>Meta mensual: ${fmt(metaMes)}</span></div>
    </article>`;
  }

  const val=+ind.valor_acumulado||0;
  const meta=+ind.meta_anual||0;
  const esp=+ind.esperado_al_corte||0;
  const pctV=meta?Math.min(val/meta,1):0;
  const pctE=meta&&esp?Math.min(esp/meta,1):0;
  return `<article class="card kpi-card ${cls}" onclick="openKpiModal(${JSON.stringify({nombre:ind.indicador_nombre,val,meta,esp,unidad:ind.unidad||'',cls,lbl,modelo,mesIdx})})">
    <div class="kpi-top"><div class="kpi-nombre">${esc(ind.indicador_nombre)}</div><span class="sem ${cls}">${lbl}</span></div>
    <div class="kpi-val" data-to="${val}">${fmt(val)}</div>
    <div class="kpi-unit">${esc(ind.unidad||'')} acumulados</div>
    <div class="kpi-bar-wrap">
      <div class="kpi-bar-esp" style="width:${Math.round(pctE*100)}%"></div>
      <div class="kpi-bar-real ${cls}" style="width:${Math.round(pctV*100)}%"></div>
    </div>
    <div class="kpi-foot"><span>Acum. <strong>${fmt(val)}</strong> / <strong>${fmt(meta)}</strong></span><span>${fmt(pctV*100,0)}% del año</span></div>
  </article>`;
}

function buildDiplomado(p){
  const cfg=DIPL_CONFIG.POR_PERIODO[p];
  if(!cfg||(!cfg.inscritos&&!cfg.sesiones.length)){
    return `<article class="card panel">
      <h3>Diplomado Juvenil · Gestión Ambiental</h3>
      <p class="panel-sub">Ciclo 1 · marzo–junio 2026 · 6 sesiones · meta ${DIPL_CONFIG.META_COBERTURA} participantes</p>
      <p style="font-size:.82rem;color:var(--inactivo)">Sin datos registrados para este período.</p>
    </article>`;
  }

  const sesionesR=cfg.sesiones.length;
  const sesTrack=Array.from({length:DIPL_CONFIG.TOTAL_SESIONES},(_,i)=>
    `<div class="sesion-dot ${i<sesionesR?'hecha':'pendiente'}">${i<sesionesR?String(i+1):''}</div>`
  ).join('');
  const sesLbls=DIPL_CONFIG.LABELS_SESIONES.map(s=>`<span>${s}</span>`).join('');

  /* Retención: S1 como referencia, las demás como % de S1 */
  const s1=cfg.sesiones[0]?.n||0;
  const sN=cfg.sesiones[cfg.sesiones.length-1]?.n||s1;
  const retencion=s1>0?sN/s1:null;
  const retColor=retencion===null?'var(--inactivo)':retencion>=.85?'var(--al-dia)':retencion>=.7?'var(--seguimiento)':'var(--rezago)';

  const retFilas=cfg.sesiones.length>1?cfg.sesiones.map((s,i)=>{
    const pct=s1>0?s.n/s1:0;
    const col=i===0?'var(--accent)':pct>=.85?'var(--al-dia)':pct>=.7?'var(--seguimiento)':'var(--rezago)';
    return `<div class="ret-row">
      <span class="ret-lbl">${esc(s.label)}</span>
      <div class="ret-bar-wrap"><div class="ret-bar" style="width:${Math.round(pct*100)}%;background:${col}"></div></div>
      <span class="ret-val" style="color:${col}">${s.n}${i>0?` (${fmt(pct*100,0)}%)`:'  ref.'}</span>
    </div>`;
  }).join(''):'';

  const pctCobertura=cfg.inscritos/DIPL_CONFIG.META_COBERTURA;

  return `<div class="diplomado-wrap">
    <div class="diplomado-titulo">Diplomado Juvenil · Gestión Ambiental</div>
    <div class="diplomado-sub">Ciclo 1 · marzo–junio 2026 · Meta: ${DIPL_CONFIG.META_COBERTURA} participantes</div>
    <div class="sesiones-track">${sesTrack}</div>
    <div class="sesiones-labels">${sesLbls}</div>
    <div class="dipl-metricas">
      <div class="dipl-met">
        <div class="dipl-met-val" style="${pctCobertura>=1?'color:var(--al-dia)':''}">${fmt(cfg.inscritos)}</div>
        <div class="dipl-met-lbl">Inscritos / meta ${DIPL_CONFIG.META_COBERTURA}</div>
      </div>
      <div class="dipl-met">
        <div class="dipl-met-val">${sesionesR}/${DIPL_CONFIG.TOTAL_SESIONES}</div>
        <div class="dipl-met-lbl">Sesiones completadas</div>
      </div>
      <div class="dipl-met">
        <div class="dipl-met-val" style="color:${retColor}">${retencion!==null?fmt(retencion*100,0)+'%':'&#8212;'}</div>
        <div class="dipl-met-lbl">Retención S1&#8594;S2</div>
      </div>
    </div>
    ${retFilas?`<div style="display:grid;gap:6px">${retFilas}</div>`:''}
    ${retencion!==null&&retencion<.85?`<p class="ret-nota">La asistencia bajó ${fmt((1-retencion)*100,0)} puntos porcentuales entre la sesión 1 y la sesión 2. Referencia para seguimiento en módulo 3 (10 abr).</p>`:''}
  </div>`;
}

function buildGrafTact(indsTact){
  const datos=indsTact.filter(r=>r.meta_anual&&+r.meta_anual>0);
  if(!datos.length) return '<p class="panel-sub">Sin indicadores tácticos con meta definida para este período.</p>';
  const W=480,trackW=W-185,labelX=185,barH=20,gap=44,pad=2;
  const h=datos.length*gap+pad*2+8;
  const colMap={'al-dia':'#157a50','seguimiento':'#7a6200','rezago':'#c94747','inactivo':'#9a8c70'};
  const bars=datos.map((ind,i)=>{
    const val=+ind.valor_acumulado||0,meta=+ind.meta_anual||1,esp=+ind.esperado_al_corte||0;
    const pctV=Math.min(val/meta,1),pctE=Math.min(esp/meta,1);
    const cls=semCls(ind.estatus,ind.es_exigible),col=colMap[cls]||'#a06800';
    const lbl=String(ind.indicador_nombre||'').length>24?String(ind.indicador_nombre).slice(0,22)+'...':String(ind.indicador_nombre);
    const y=i*gap+pad;
    return `<g class="bar-group" style="cursor:pointer"
      data-ind="${esc(ind.indicador_nombre)}"
      data-val="${fmt(val)} ${esc(ind.unidad||'')}"
      data-meta="${fmt(meta)} ${esc(ind.unidad||'')}"
      data-pct="${val>=meta?'Meta alcanzada':fmt(pctV*100,0)+'% del año'}"
      data-sem="${semLbl(cls)}">
      <text x="0" y="${y+barH/2}" dominant-baseline="central" style="font-size:10.5px;fill:#3d2e0a;font-family:'Sora',sans-serif">${esc(lbl)}</text>
      <rect x="${labelX}" y="${y}" width="${trackW}" height="${barH}" rx="5" fill="#f0e6c8"/>
      <rect x="${labelX}" y="${y}" width="${pctE*trackW}" height="${barH}" rx="5" fill="none" stroke="#c8b080" stroke-width="1.5" stroke-dasharray="4 3"/>
      <rect x="${labelX}" y="${y}" width="${pctV*trackW}" height="${barH}" rx="5" fill="${col}" opacity=".82"/>
      ${val<meta?`<text x="${labelX+pctV*trackW+6}" y="${y+barH/2}" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:${col};font-family:'JetBrains Mono',monospace">${fmt(pctV*100,0)}%</text>`:''}
      ${val>=meta?`<text x="${labelX+pctV*trackW-6}" y="${y+barH/2}" dominant-baseline="central" text-anchor="end" style="font-size:9px;font-weight:700;fill:#fff;font-family:'JetBrains Mono',monospace">&#10003;</text>`:''}
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${h}" style="overflow:visible;width:100%">${bars}</svg>`;
}

function buildAlertas(indsEst, aporta){
  const alertas=[];
  if(!aporta){
    return `<div class="alerta inactivo">Este período corresponde a planificación. Los indicadores del ciclo EPC se miden desde marzo.</div>`;
  }
  indsEst.forEach(ind=>{
    const cls=semCls(ind.estatus,ind.es_exigible);
    const nom=ind.indicador_nombre;
    if(cls==='al-dia'){
      if(ind.modelo_medicion==='monthly_recurrent')
        alertas.push({cls:'al-dia',txt:`<strong>${esc(nom)}</strong> cumplió el estándar mensual. Ciclo sostenido: ${+ind.meses_cumplidos||0}/8 meses.`});
      else
        alertas.push({cls:'al-dia',txt:`<strong>${esc(nom)}</strong> supera el ritmo esperado al corte.`});
    } else if(cls==='seguimiento'){
      alertas.push({cls:'seguimiento',txt:`<strong>${esc(nom)}</strong> está por debajo del ritmo esperado. Verificar en el próximo cierre.`});
    } else if(cls==='rezago'){
      alertas.push({cls:'rezago',txt:`<strong>${esc(nom)}</strong> está por debajo del umbral y su ventana es exigible.`});
    } else {
      if(ind.modelo_medicion==='milestone_window')
        alertas.push({cls:'inactivo',txt:`<strong>${esc(nom)}</strong> — hito no activo en este corte.`});
      else
        alertas.push({cls:'inactivo',txt:`<strong>${esc(nom)}</strong> — sin actividad en este corte del año.`});
    }
  });
  if(!alertas.length) alertas.push({cls:'al-dia',txt:'No se identifican rezagos en los indicadores estratégicos del período.'});
  return alertas.map(a=>`<div class="alerta ${a.cls}">${a.txt}</div>`).join('');
}

function buildTabla(indsEst, indsTact){
  return `<table>
  <thead><tr><th>Indicador</th><th>Cat.</th><th>Este mes</th><th>Acumulado</th><th>Meta anual</th><th>Estado</th></tr></thead>
  <tbody>${[...indsEst,...indsTact].map(ind=>{
    const cls=semCls(ind.estatus,ind.es_exigible);
    const catLbl=ind.categoria==='estrategico'
      ?`<span class="sem al-dia" style="font-size:.58rem">Estrat.</span>`
      :`<span class="sem inactivo" style="font-size:.58rem">Táctico</span>`;
    return `<tr>
      <td class="nom">${esc(ind.indicador_nombre)}</td>
      <td>${catLbl}</td>
      <td class="num">${fmt(+ind.valor_mes||0)}</td>
      <td class="num"><strong>${fmt(+ind.valor_acumulado||0)}</strong></td>
      <td class="num">${ind.meta_anual?fmt(+ind.meta_anual):'&#8212;'}</td>
      <td><span class="sem ${cls}">${semLbl(cls)}</span></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function openKpiModal(data){
  const {nombre,val,meta,metaMes,esp,mesesC,unidad,cls,lbl,modelo,mesIdx}=data;
  document.getElementById('modalTitle').textContent=nombre;
  document.getElementById('modalSub').textContent=`Detalle · ${MESES[mesIdx||0]} 2026`;
  let body='';
  if(modelo==='monthly_recurrent'){
    const dots=Array.from({length:8},(_,i)=>`<div style="flex:1;height:18px;border-radius:4px;background:${i<(mesesC||0)?'var(--accent)':'var(--line-soft)'};border:1.5px solid ${i<(mesesC||0)?'var(--accent)':'var(--line)'};display:flex;align-items:center;justify-content:center;font-size:9px;color:${i<(mesesC||0)?'#fff':'var(--muted)'};font-weight:700">${i<(mesesC||0)?'&#10003;':''}</div>`).join('');
    body=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
      <span class="modal-val-big">${fmt(val)}</span>
      <span style="font-size:.95rem;color:var(--muted)">${esc(unidad)} este mes</span>
      <span class="sem ${cls}" style="margin-left:6px">${lbl}</span>
    </div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px">Progreso del ciclo EPC — 8 meses (marzo a octubre)</p>
    <div style="display:flex;gap:4px;margin-bottom:8px">${dots}</div>
    <p style="font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:16px"><strong style="color:var(--accent)">${mesesC||0}</strong> de 8 meses del ciclo cumplidos</p>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmt(val)}</div><div class="modal-stat-lbl">Este mes</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${fmt(metaMes||0)}</div><div class="modal-stat-lbl">Meta mensual</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${mesesC||0}/8</div><div class="modal-stat-lbl">Meses ciclo</div></div>
    </div>`;
  } else {
    const pctV=meta?Math.min((+val||0)/(+meta),1):0;
    const pctE=meta&&esp?Math.min((+esp)/(+meta),1):0;
    body=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
      <span class="modal-val-big">${fmt(val)}</span>
      <span style="font-size:.95rem;color:var(--muted)">${esc(unidad)}</span>
      <span class="sem ${cls}" style="margin-left:6px">${lbl}</span>
    </div>
    <div class="modal-bar-wrap">
      <div class="modal-bar-esp" style="width:${Math.round(pctE*100)}%"></div>
      <div class="modal-bar-real" style="width:0%" id="mBar"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.77rem;color:var(--muted);margin-bottom:16px">
      <span>Ritmo esperado: ${fmt(pctE*100,0)}%</span>
      <span>${fmt(pctV*100,0)}% cumplido</span>
    </div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmt(val)}</div><div class="modal-stat-lbl">Acumulado</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${meta?fmt(meta):'&#8212;'}</div><div class="modal-stat-lbl">Meta anual</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${esp?fmt(esp):'&#8212;'}</div><div class="modal-stat-lbl">Esperado al corte</div></div>
    </div>`;
  }
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>{ const b=document.getElementById('mBar'); if(b&&meta){const pv=Math.min((+val)/(+meta),1);b.style.width=Math.round(pv*100)+'%'} },80);
}

function openChartModal(title,sub,html){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSub').textContent=sub;
  document.getElementById('modalBody').innerHTML=`<div style="padding:8px 0">${html}</div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect() }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open') }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModalDirect() });

function attachEvents(){
  document.querySelectorAll('.bar-group').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const sc={'Al día':'al-dia','En seguimiento':'seguimiento','Rezago':'rezago','Inactivo en este corte':'inactivo'}[el.dataset.sem||'']||'inactivo';
      showTip(e,`<strong>${esc(el.dataset.ind||'')}</strong><br>
        ${el.dataset.val?`Valor: <strong>${esc(el.dataset.val)}</strong><br>`:''}
        ${el.dataset.meta?`Meta: ${esc(el.dataset.meta)}<br>`:''}
        ${el.dataset.pct?`Avance: <strong>${esc(el.dataset.pct)}</strong><br>`:''}
        <span class="t-sem ${sc}">${esc(el.dataset.sem||'')}</span>`);
    });
    el.addEventListener('mouseleave',hideTip);
  });
  document.querySelectorAll('.chart-host').forEach(host=>{
    const panel=host.closest('.panel');
    if(!panel) return;
    host.addEventListener('click',()=>openChartModal(panel.querySelector('h3')?.textContent||'',panel.querySelector('.panel-sub')?.textContent||'',host.innerHTML));
  });
}

init();
</script>
</body>
</html>
