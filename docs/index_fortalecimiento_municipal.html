<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fortalecimiento Municipal · AALA</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  /* Paleta base AALA */
  --bg: #eef4fc;
  --surface: #f4f8fe;
  --card: #ffffff;
  --text: #0c1d3a;
  --text-2: #2a4570;
  --muted: #6685aa;
  --line: #c5d8f0;
  --line-soft: #ddeaf8;

  /* Acento del programa — azul institucional profundo */
  --accent: #1a4a8a;
  --accent-mid: #2060b8;
  --accent-light: #3d7dd4;
  --accent-soft: #c8dcf5;
  --accent-pale: #e8f1fc;

  /* Semáforo unificado */
  --al-dia: #157a50;
  --al-dia-soft: #c5eed9;
  --al-dia-pale: #eafaf2;
  --seguimiento: #8a6200;
  --seguimiento-soft: #fef0c0;
  --seguimiento-pale: #fffbeb;
  --rezago: #8f1c1c;
  --rezago-soft: #fce8e8;
  --rezago-pale: #fff5f5;
  --sin-actividad: #5a6a82;
  --sin-actividad-soft: #e2eaf4;

  /* Sombras */
  --sh-sm: 0 1px 4px rgba(10,35,80,.05), 0 4px 16px rgba(10,35,80,.05);
  --sh: 0 2px 12px rgba(10,35,80,.08), 0 8px 32px rgba(10,35,80,.07);
  --sh-lg: 0 8px 40px rgba(10,35,80,.14), 0 2px 8px rgba(10,35,80,.05);
  --sh-hover: 0 16px 48px rgba(10,35,80,.16), 0 4px 12px rgba(10,35,80,.08);

  --radius: 18px;
  --radius-sm: 11px;
  --radius-xs: 7px;

  --font-head: 'Lora', Georgia, serif;
  --font-body: 'Sora', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { scroll-behavior: smooth }
body {
  font-family: var(--font-body);
  background: linear-gradient(160deg, #d4e6ff 0%, #eef4fc 38%, #e4f0fb 68%, #eef4ff 100%) fixed;
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Textura atmosférica */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 85% 65% at 0% -5%, rgba(26,74,138,.20) 0%, transparent 50%),
    radial-gradient(ellipse 65% 55% at 100% 110%, rgba(61,125,212,.15) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 80% 8%, rgba(90,160,240,.10) 0%, transparent 50%);
}
body::after {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle 1px at 1px 1px, rgba(26,74,138,.06) 1px, transparent 0);
  background-size: 36px 36px;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(238,244,252,.92);
  backdrop-filter: blur(20px) saturate(1.7);
  -webkit-backdrop-filter: blur(20px) saturate(1.7);
  border-bottom: 1px solid var(--line-soft);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 28px;
}

.back {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px 8px 10px; border-radius: 999px;
  background: rgba(255,255,255,.85); border: 1px solid var(--line);
  text-decoration: none; color: var(--text-2);
  font-weight: 600; font-size: .82rem;
  transition: all .2s ease; white-space: nowrap;
}
.back:hover { background: var(--accent-pale); border-color: var(--accent-soft); color: var(--accent); transform: translateY(-1px) }
.back-arrow {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-soft); color: var(--accent);
  font-size: .78rem; font-weight: 700; flex-shrink: 0;
}

/* Pills de mes */
.month-pills {
  display: flex; gap: 5px; align-items: center;
  background: rgba(255,255,255,.6);
  border: 1px solid var(--line-soft);
  border-radius: 999px; padding: 4px 6px;
}
.month-pill {
  padding: 5px 14px; border-radius: 999px; border: none; cursor: pointer;
  font-family: var(--font-body); font-size: .78rem; font-weight: 700;
  color: var(--muted); background: transparent;
  transition: all .2s ease; letter-spacing: .02em;
}
.month-pill:hover:not(:disabled) { color: var(--accent-mid); background: var(--accent-pale) }
.month-pill.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-mid));
  color: #fff;
  box-shadow: 0 2px 10px rgba(26,74,138,.35);
}
.month-pill:disabled { opacity: .38; cursor: default }

/* Badge estado global */
.estado-global {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 999px;
  font-size: .78rem; font-weight: 700; white-space: nowrap;
  border: 1.5px solid transparent;
  transition: all .3s ease;
}
.estado-global .dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  animation: pulse-dot 2.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1 } 50% { opacity: .45 }
}
.estado-global.al-dia { background: var(--al-dia-pale); color: var(--al-dia); border-color: rgba(21,122,80,.2) }
.estado-global.al-dia .dot { background: var(--al-dia) }
.estado-global.seguimiento { background: var(--seguimiento-pale); color: var(--seguimiento); border-color: rgba(138,98,0,.2) }
.estado-global.seguimiento .dot { background: var(--seguimiento) }
.estado-global.rezago { background: var(--rezago-pale); color: var(--rezago); border-color: rgba(143,28,28,.2) }
.estado-global.rezago .dot { background: var(--rezago) }
.estado-global.sin-actividad { background: var(--sin-actividad-soft); color: var(--sin-actividad); border-color: rgba(90,106,130,.2) }
.estado-global.sin-actividad .dot { background: var(--sin-actividad) }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap }

/* ── WRAP ── */
.wrap { max-width: 1340px; margin: 0 auto; padding: 28px 24px 80px; position: relative; z-index: 1 }

/* ── CARD BASE ── */
.card {
  background: var(--card);
  border: 1.5px solid var(--line-soft);
  border-radius: var(--radius);
  box-shadow: var(--sh-sm);
  transition: transform .3s cubic-bezier(.25,.46,.45,.94), box-shadow .3s ease, border-color .2s;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--sh-hover); border-color: var(--accent-soft) }

/* ── HERO ── */
.hero { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 20px }

.hero-main {
  padding: 36px 40px 32px;
  background: linear-gradient(135deg, #ffffff 0%, #eaf3ff 55%, #d8eaff 100%);
  position: relative; overflow: hidden;
}
.hero-main::before {
  content: '';
  position: absolute; right: -80px; top: -80px;
  width: 340px; height: 340px; border-radius: 50%;
  background: radial-gradient(circle, rgba(61,125,212,.14) 0%, rgba(26,74,138,.06) 50%, transparent 70%);
  pointer-events: none;
}

.program-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .7rem; font-weight: 800; letter-spacing: .13em;
  text-transform: uppercase; color: var(--accent-mid); margin-bottom: 10px;
}
.program-eyebrow::before {
  content: ''; display: block; width: 18px; height: 2px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent-mid));
  border-radius: 2px;
}

.hero-main h1 {
  font-family: var(--font-head);
  font-size: clamp(1.9rem, 3vw, 2.7rem);
  line-height: 1.1; letter-spacing: -.02em; margin-bottom: 14px;
  background: linear-gradient(135deg, var(--text) 40%, var(--accent-mid) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.hero-narrative {
  font-size: .96rem; color: var(--text-2); line-height: 1.75;
  max-width: 58ch; margin-bottom: 20px;
}

/* Mini stats en hero */
.hero-stats { display: flex; gap: 10px; flex-wrap: wrap }
.hero-stat-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 999px;
  background: rgba(255,255,255,.75); border: 1.5px solid var(--line-soft);
  font-size: .79rem; font-weight: 600; color: var(--text-2);
  transition: all .2s ease;
}
.hero-stat-pill:hover { background: var(--accent-pale); border-color: var(--accent-soft); color: var(--accent) }
.hero-stat-pill strong { font-family: var(--font-mono); color: var(--accent-mid); font-size: .84rem }

/* HERO SIDE — gauge */
.hero-side {
  padding: 28px 24px;
  background: linear-gradient(160deg, #e8f3ff 0%, #d4e8ff 50%, #e0f0ff 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
}

.gauge-wrap { position: relative; display: flex; flex-direction: column; align-items: center }
.gauge-label-top {
  font-size: .69rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; text-align: center;
}
.gauge-svg { display: block; overflow: visible }
.gauge-track { fill: none; stroke: var(--line); stroke-width: 12; stroke-linecap: round }
.gauge-fill {
  fill: none; stroke: url(#gaugeGrad); stroke-width: 12; stroke-linecap: round;
  stroke-dasharray: 251.2; stroke-dashoffset: 251.2;
  transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
  transform: rotate(-90deg); transform-origin: 50px 50px;
}
.gauge-center-value {
  font-family: var(--font-mono); font-size: 1.55rem; font-weight: 500;
  fill: var(--accent); text-anchor: middle; dominant-baseline: central;
}
.gauge-center-label {
  font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  fill: var(--muted); text-anchor: middle; dominant-baseline: central;
}

.gauge-mini-list { width: 100%; display: grid; gap: 8px }
.gauge-mini-item {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,.65); border: 1.5px solid var(--line-soft);
  transition: background .2s;
}
.gauge-mini-item:hover { background: rgba(255,255,255,.9) }
.gauge-mini-lbl { font-size: .76rem; color: var(--text-2); font-weight: 500 }
.gauge-mini-val { font-family: var(--font-mono); font-size: .82rem; color: var(--accent-mid); font-weight: 500 }

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin-bottom: 20px }

.kpi-card {
  padding: 20px 18px 18px;
  border-top: 3px solid var(--line-soft);
  position: relative; overflow: hidden;
  transition: transform .25s cubic-bezier(.25,.46,.45,.94), box-shadow .25s, border-color .2s;
}
.kpi-card:hover { transform: translateY(-4px); box-shadow: var(--sh-lg) }
.kpi-card.al-dia { border-top-color: var(--al-dia) }
.kpi-card.seguimiento { border-top-color: var(--seguimiento) }
.kpi-card.rezago { border-top-color: var(--rezago) }
.kpi-card.sin-actividad { border-top-color: var(--sin-actividad) }

.kpi-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px }
.kpi-nombre { font-size: .71rem; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); line-height: 1.35 }

/* Semáforo badge unificado */
.sem {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 999px;
  font-size: .64rem; font-weight: 800; letter-spacing: .05em; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0;
}
.sem.al-dia { background: var(--al-dia-soft); color: var(--al-dia) }
.sem.seguimiento { background: var(--seguimiento-soft); color: var(--seguimiento) }
.sem.rezago { background: var(--rezago-soft); color: var(--rezago) }
.sem.sin-actividad { background: var(--sin-actividad-soft); color: var(--sin-actividad) }
.sem::before { content: '●'; font-size: .55em }

.kpi-valor {
  font-family: var(--font-mono); font-size: 2rem; font-weight: 500;
  line-height: 1; letter-spacing: -.03em; color: var(--text); margin-bottom: 3px;
  transition: color .3s;
}
.kpi-unidad { font-size: .78rem; color: var(--muted); margin-bottom: 10px }

/* Barra dual: esperado (fondo) + real (frente) */
.kpi-barra-wrap { position: relative; height: 6px; border-radius: 999px; background: var(--line-soft); overflow: hidden; margin-bottom: 8px }
.kpi-barra-esperado {
  position: absolute; left: 0; top: 0; height: 100%;
  border-radius: 999px;
  background: repeating-linear-gradient(90deg, var(--line) 0, var(--line) 4px, transparent 4px, transparent 8px);
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.kpi-barra-real {
  position: absolute; left: 0; top: 0; height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent-mid));
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.kpi-barra-real.al-dia { background: linear-gradient(90deg, #1d9e68, var(--al-dia)) }
.kpi-barra-real.seguimiento { background: linear-gradient(90deg, #c8960a, var(--seguimiento)) }
.kpi-barra-real.rezago { background: linear-gradient(90deg, #e05c5c, var(--rezago)) }

.kpi-meta-txt {
  font-size: .73rem; color: var(--muted); display: flex; justify-content: space-between;
}
.kpi-meta-txt strong { color: var(--text-2); font-weight: 600 }

/* Delta badge */
.delta {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: .7rem; font-weight: 700; padding: 2px 7px; border-radius: 999px;
  margin-left: 6px; vertical-align: middle;
  transition: all .3s ease;
}
.delta.sube { background: var(--al-dia-soft); color: var(--al-dia) }
.delta.baja { background: var(--rezago-soft); color: var(--rezago) }
.delta.igual { background: var(--sin-actividad-soft); color: var(--sin-actividad) }

/* ── SECCIÓN GRÁFICAS ── */
.section { margin-bottom: 20px }
.section-head {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 12px;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--line-soft);
}
.section-narrative {
  font-family: var(--font-head);
  font-size: 1.2rem; font-weight: 600; color: var(--text); line-height: 1.25;
  letter-spacing: -.01em;
}
.section-sub { font-size: .83rem; color: var(--muted); margin-top: 2px }

/* Grid dos columnas */
.grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px }
.grid-2-eq { display: grid; grid-template-columns: 1fr 1fr; gap: 16px }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 13px }

.panel { padding: 22px 24px }
.panel-accent { border-top: 3px solid var(--accent-mid) }

.panel h3 {
  font-family: var(--font-head); font-size: 1rem; font-weight: 600;
  color: var(--text); margin-bottom: 4px; letter-spacing: -.01em;
}
.panel-sub { font-size: .82rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5 }

/* Barras SVG con tooltip */
.chart-host { position: relative }
.chart-host svg { display: block; width: 100%; overflow: visible }

/* Tooltip flotante */
.tooltip {
  position: fixed; z-index: 999;
  background: rgba(12,29,58,.92); color: #fff;
  padding: 9px 13px; border-radius: var(--radius-sm);
  font-size: .8rem; line-height: 1.55; pointer-events: none;
  opacity: 0; transition: opacity .15s;
  max-width: 220px; backdrop-filter: blur(6px);
  box-shadow: var(--sh-lg);
}
.tooltip.visible { opacity: 1 }
.tooltip strong { color: #8ec8f8 }
.tooltip .t-sem { font-size: .68rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; margin-top: 3px }
.tooltip .t-sem.al-dia { color: #6ee7b7 }
.tooltip .t-sem.seguimiento { color: #fcd34d }
.tooltip .t-sem.rezago { color: #fca5a5 }

/* Alertas unificadas */
.alertas-list { display: grid; gap: 9px }
.alerta {
  padding: 11px 15px; border-radius: var(--radius-sm);
  border-left: 3px solid; font-size: .86rem; line-height: 1.6;
  display: flex; align-items: flex-start; gap: 10px;
}
.alerta-icon { font-size: .9rem; flex-shrink: 0; margin-top: 1px }
.alerta.al-dia { background: var(--al-dia-pale); border-color: var(--al-dia); color: #0d4d32 }
.alerta.seguimiento { background: var(--seguimiento-pale); border-color: var(--seguimiento); color: #5a3e00 }
.alerta.rezago { background: var(--rezago-pale); border-color: var(--rezago); color: #5c1212 }
.alerta.informacion { background: var(--accent-pale); border-color: var(--accent-light); color: var(--accent) }

/* Tabla */
.tbl-wrap { overflow: auto; border-radius: var(--radius-sm); border: 1.5px solid var(--line-soft) }
table { width: 100%; border-collapse: collapse; font-size: .82rem }
th {
  background: var(--surface); color: var(--accent-mid);
  font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em;
  padding: 9px 12px; border-bottom: 2px solid var(--line); text-align: left; white-space: nowrap;
  position: sticky; top: 0;
}
td { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; white-space: nowrap }
tr:last-child td { border-bottom: none }
tbody tr { transition: background .15s }
tbody tr:hover td { background: var(--accent-pale) }
td.num { font-family: var(--font-mono); text-align: right }
td.destacado { font-weight: 600; color: var(--text-2) }

/* Municipios grid */
.muni-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 9px; margin-top: 4px }
.muni-card {
  padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1.5px solid var(--line-soft);
  transition: all .2s;
}
.muni-card:hover { background: var(--accent-pale); border-color: var(--accent-soft); transform: translateY(-2px) }
.muni-nombre { font-size: .82rem; font-weight: 600; color: var(--text-2); margin-bottom: 4px }
.muni-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 999px;
  font-size: .65rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
}
.muni-badge.nucleo { background: var(--accent-soft); color: var(--accent) }

/* Cards de resumen operativo */
.ops-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px }
.ops-card {
  padding: 16px 15px; border-radius: var(--radius);
  background: linear-gradient(180deg, #fff, #f5f9ff);
  border: 1.5px solid var(--line-soft);
  box-shadow: var(--sh-sm);
  transition: all .2s;
  text-align: center;
}
.ops-card:hover { transform: translateY(-2px); box-shadow: var(--sh) }
.ops-val { font-family: var(--font-mono); font-size: 1.7rem; font-weight: 500; color: var(--text); line-height: 1 }
.ops-lbl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 5px }
.ops-sub { font-size: .76rem; color: var(--text-2); margin-top: 3px }

/* Nota narrativa / interpretación */
.nota-narrativa {
  margin-top: 14px; padding: 13px 16px;
  background: linear-gradient(135deg, var(--accent-pale), rgba(255,255,255,.6));
  border-left: 3px solid var(--accent-light);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: .87rem; color: var(--text-2); line-height: 1.7;
  font-style: italic;
}
.nota-narrativa strong { color: var(--accent); font-style: normal }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 14px;
  margin: 24px 0 16px;
  color: var(--accent-mid); font-size: .68rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: .1em;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--line), transparent);
}

/* Loading */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 60px; color: var(--muted) }
.spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--line); border-top-color: var(--accent-mid); animation: spin 1s linear infinite }
@keyframes spin { to { transform: rotate(360deg) } }

/* KPI nota proxy */
.kpi-nota-proxy {
  margin-top: 8px; padding: 7px 10px;
  background: var(--seguimiento-pale); border-left: 2px solid var(--seguimiento);
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  font-size: .72rem; color: var(--seguimiento); line-height: 1.5;
}

/* KPI zoom hint */
.kpi-zoom-hint {
  margin-top: 8px; font-size: .68rem; color: var(--muted);
  text-align: right; opacity: 0; transition: opacity .2s;
}
.kpi-card:hover .kpi-zoom-hint { opacity: 1 }

/* ── MODAL DE ZOOM ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(10,25,58,.55);
  backdrop-filter: blur(8px) saturate(1.4);
  -webkit-backdrop-filter: blur(8px) saturate(1.4);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .25s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all }

.modal-box {
  background: var(--card); border-radius: var(--radius);
  box-shadow: 0 24px 80px rgba(10,25,58,.30), 0 4px 16px rgba(10,25,58,.12);
  border: 1.5px solid var(--line-soft);
  max-width: 560px; width: 100%;
  transform: translateY(20px) scale(.97);
  transition: transform .3s cubic-bezier(.25,.46,.45,.94);
  overflow: hidden;
}
.modal-overlay.open .modal-box { transform: none }

.modal-header {
  padding: 24px 28px 16px;
  border-bottom: 1px solid var(--line-soft);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  background: linear-gradient(135deg, #fff 0%, var(--accent-pale) 100%);
}
.modal-title { font-family: var(--font-head); font-size: 1.15rem; font-weight: 600; color: var(--text); line-height: 1.3 }
.modal-close {
  width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--line);
  background: var(--surface); color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
  transition: all .15s; line-height: 1;
}
.modal-close:hover { background: var(--rezago-soft); color: var(--rezago); border-color: var(--rezago) }

.modal-body { padding: 20px 28px 24px }

.modal-kpi-hero {
  display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px;
}
.modal-kpi-val {
  font-family: var(--font-mono); font-size: 2.8rem; font-weight: 500;
  line-height: 1; letter-spacing: -.04em; color: var(--text);
}
.modal-kpi-unit { font-size: .9rem; color: var(--muted) }

.modal-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px;
}
.modal-stat {
  padding: 12px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1.5px solid var(--line-soft);
}
.modal-stat-lbl { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px }
.modal-stat-val { font-family: var(--font-mono); font-size: 1.1rem; color: var(--text) }

/* Mini gráfica histórica en modal */
.modal-hist { margin-top: 14px }
.modal-hist-title { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px }

/* Animación entrada stagger */
@keyframes fadeUp { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:none } }
.s1 { animation: fadeUp .45s .05s ease both }
.s2 { animation: fadeUp .45s .12s ease both }
.s3 { animation: fadeUp .45s .19s ease both }
.s4 { animation: fadeUp .45s .26s ease both }
.s5 { animation: fadeUp .45s .33s ease both }
.s6 { animation: fadeUp .45s .40s ease both }

/* Responsive */
@media (max-width: 1100px) {
  .hero, .grid-2 { grid-template-columns: 1fr }
  .kpi-grid, .ops-grid { grid-template-columns: repeat(2,1fr) }
  .grid-2-eq { grid-template-columns: 1fr }
}
@media (max-width: 700px) {
  .wrap { padding: 16px 14px 60px }
  .hero-main { padding: 24px 20px 20px }
  .topbar { padding: 8px 14px }
  .kpi-grid, .ops-grid { grid-template-columns: 1fr }
  .month-pills { gap: 3px }
}

<body>

<div id="tooltip" class="tooltip"></div>

<!-- MODAL DE ZOOM -->
<div class="modal-overlay" id="kpiModal" onclick="closeKpiModal(event)">
  <div class="modal-box" id="kpiModalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">—</div>
      <button class="modal-close" onclick="closeKpiModalDirect()" aria-label="Cerrar">&#215;</button>
    </div>

</div>

<!-- ── TOPBAR ── -->
<nav class="topbar">
  <a href="./index.html" class="back">
    <span class="back-arrow">&#8592;</span>
    Volver al inicio
  </a>

  <div class="month-pills" id="monthPills" role="group" aria-label="Seleccionar período">
    <!-- generado por JS -->
  </div>

  <div class="topbar-right">
    <div class="estado-global sin-actividad" id="estadoGlobal">
      <span class="dot"></span>
      <span id="estadoLabel">Cargando…</span>
    </div>
  </div>
</nav>

<!-- ── CONTENIDO ── -->
<main class="wrap" id="mainWrap">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <span>Cargando datos del programa…</span>
  </div>
</main>

<script>
/* ═══════════════════════════════════════
   DATOS Y ESTADO
═══════════════════════════════════════ */
const PATHS = {
  total:        './data/fortalecimiento_municipal/total_mes.csv',
  indicadores:  './data/fortalecimiento_municipal/institucional_indicadores.csv',
  capTema:      './data/fortalecimiento_municipal/capacitaciones_tema_mes.csv',
  capMuni:      './data/fortalecimiento_municipal/capacitaciones_municipio_mes.csv',
  asistSector:  './data/fortalecimiento_municipal/asistencias_sector_mes.csv',
  reunTipo:     './data/fortalecimiento_municipal/reuniones_tipo_mes.csv',
  estudiosSect: './data/fortalecimiento_municipal/estudios_sector_mes.csv',
};

let state = {
  periodo: '',
  data: {}
};

/* ═══════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════ */
const fmt   = (n, d=0) => new Intl.NumberFormat('es-GT',{maximumFractionDigits:d,minimumFractionDigits:d}).format(+n||0);
const fmtPct = n => `${fmt(+n*100, 0)}%`;
const safe  = v => (v==null||v==='')?'—':String(v);
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function parseCsv(url){
  return new Promise((res,rej)=>{
    Papa.parse(url,{download:true,header:true,skipEmptyLines:'greedy',
      complete:r=>res((r.data||[]).map(row=>{
        const o={};
        for(const k of Object.keys(row)){
          const v=row[k];
          const n=Number(String(v).replace(/,/g,''));
          o[k]=(v!==''&&!isNaN(n))?n:v;
        }
        return o;
      })),
      error:rej
    });
  });
}

/* Semáforo unificado */
function semaforo(pct){
  const p = +pct||0;
  if(p===0)  return {cls:'sin-actividad', label:'Sin actividad'};
  if(p>=1)   return {cls:'al-dia',       label:'Al día'};
  if(p>=.8)  return {cls:'seguimiento',  label:'En seguimiento'};
  return             {cls:'rezago',       label:'Rezago'};
}
function semFromStr(s){
  const m={green:'al-dia',red:'rezago',yellow:'seguimiento',muted:'sin-actividad',
           'al-dia':'al-dia',seguimiento:'seguimiento',rezago:'rezago','sin-actividad':'sin-actividad'};
  return m[s]||'sin-actividad';
}

/* Counter animado */
function animateCounter(el, from, to, dur=400){
  const start=performance.now();
  function step(now){
    const p=Math.min((now-start)/dur,1);
    const ease=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    const val=from+(to-from)*ease;
    el.textContent=fmt(val,val%1===0?0:1);
    if(p<1) requestAnimationFrame(step);
    else el.textContent=fmt(to,to%1===0?0:1);
  }
  requestAnimationFrame(step);
}

/* Gauge animado */
function setGauge(pct){
  const el=document.getElementById('gaugeFill');
  if(!el)return;
  const circ=251.2;
  const offset=circ-(Math.min(pct,1.4)*circ);
  el.style.strokeDashoffset=offset;
  const valEl=document.getElementById('gaugeVal');
  if(valEl) valEl.textContent=fmt(pct*100,0)+'%';
}

/* Tooltip */
const tip=document.getElementById('tooltip');
function showTip(e,html){
  tip.innerHTML=html; tip.classList.add('visible');
  moveTip(e);
}
function moveTip(e){
  const x=e.clientX+14, y=e.clientY-10;
  const maxX=window.innerWidth-240, maxY=window.innerHeight-100;
  tip.style.left=Math.min(x,maxX)+'px';
  tip.style.top=Math.min(y,maxY)+'px';
}
function hideTip(){ tip.classList.remove('visible') }
document.addEventListener('mousemove',e=>{ if(tip.classList.contains('visible')) moveTip(e) });

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init(){
  try{
    const [total,indicadores,capTema,capMuni,asistSector,reunTipo,estudiosSect]=
      await Promise.all(Object.values(PATHS).map(parseCsv));
    state.data={total,indicadores,capTema,capMuni,asistSector,reunTipo,estudiosSect};

    // Períodos disponibles
    const periodos=[...new Set(total.map(r=>r.periodo))].sort();
    state.periodo=periodos[periodos.length-1];

    buildPills(periodos);
    renderAll();
    document.getElementById('loadingState')?.remove();

  }catch(err){
    console.error(err);
    document.getElementById('mainWrap').innerHTML=
      `<div class="loading"><p>Error al cargar los datos. Verifica que los CSV existen en <code>./data/fortalecimiento_municipal/</code></p></div>`;
  }
}

/* ── Pills de mes ── */
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function buildPills(periodos){
  const container=document.getElementById('monthPills');
  container.innerHTML='';
  ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06',
   '2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'].forEach(p=>{
    const btn=document.createElement('button');
    btn.className='month-pill'+(p===state.periodo?' active':'');
    btn.textContent=MESES[+p.split('-')[1]-1];
    const hasData=periodos.includes(p);
    btn.disabled=!hasData;
    if(hasData){
      btn.onclick=()=>{
        state.periodo=p;
        document.querySelectorAll('.month-pill').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderAll();
      };
    }
    container.appendChild(btn);
  });
}

/* ═══════════════════════════════════════
   RENDER PRINCIPAL
═══════════════════════════════════════ */
function renderAll(){
  const {total,indicadores,capTema,capMuni,asistSector,reunTipo,estudiosSect}=state.data;
  const p=state.periodo;

  const totRow=total.find(r=>r.periodo===p)||{};
  const prevP=prevPeriodo(p);
  const totPrev=prevP?total.find(r=>r.periodo===prevP)||{}:{};

  // Indicadores del período
  const inds=indicadores.filter(r=>r.periodo===p);
  const indsPrim=inds.filter(r=>r.categoria==='primario').sort((a,b)=>+a.orden_dashboard-+b.orden_dashboard);

  // Estado global (promedio de primarios con meta)
  const primConMeta=indsPrim.filter(r=>r.meta_anual&&r.meta_cohorte);
  // Estado global basado en ritmo al corte, no en % del año completo
  const avgPctCohorte=primConMeta.length
    ? primConMeta.reduce((s,r)=>s+(Math.min(+r.pct_cohorte||0, 2)),0)/primConMeta.length
    : 0;
  const avgPct=avgPctCohorte;
  const estadoG=semaforo(Math.min(avgPctCohorte, 1.5));
  const estadoEl=document.getElementById('estadoGlobal');
  estadoEl.className='estado-global '+estadoG.cls;
  document.getElementById('estadoLabel').textContent=estadoG.label;

  // Render hero + secciones
  const main=document.getElementById('mainWrap');
  main.innerHTML=buildHTML(totRow,totPrev,inds,indsPrim,capTema,capMuni,asistSector,reunTipo,estudiosSect,p,prevP,avgPct);

  // Animar gauge
  const indPrincipal=indsPrim.find(r=>r.indicador_id==='personas_capacitadas_nucleo');
  // Gauge muestra avance anual real (no cohorte) — es informativo, no semáforo
  const pctGauge=indPrincipal?(+indPrincipal.pct_meta_anual||0):avgPct;
  requestAnimationFrame(()=>setGauge(pctGauge));

  // Animar contadores KPI
  setTimeout(()=>{
    document.querySelectorAll('.kpi-valor[data-to]').forEach(el=>{
      const to=+el.dataset.to;
      animateCounter(el,0,to);
    });
  },150);

  attachTooltips();
}

function prevPeriodo(p){
  const m=+p.split('-')[1];
  if(m<=1)return null;
  return p.split('-')[0]+'-'+(String(m-1).padStart(2,'0'));
}

/* ═══════════════════════════════════════
   BUILD HTML
═══════════════════════════════════════ */
function buildHTML(tot,totPrev,inds,indsPrim,capTema,capMuni,asistSector,reunTipo,estudiosSect,p,prevP,avgPct){
  const mesLabel=MESES[+p.split('-')[1]-1]+' '+p.split('-')[0];

  // Narrativa del hero según período
  const narrativas={
    '2026-01': `En enero dimos el primer paso del año. Iniciamos la cohorte con una capacitación en saneamiento ambiental y activamos las primeras mesas técnicas municipales. El terreno está sembrado para lo que viene.`,
    '2026-02': `Febrero fue un mes de trabajo de campo intenso. Realizamos <strong>${fmt(tot.asistencias_priorizadas_proxy_acum)}</strong> asistencias técnicas en agua y saneamiento, avanzamos en estudios de residuos sólidos y consolidamos la articulación con los CODEMA del lago.`,
    '2026-03': `Marzo marcó un salto significativo. Llegamos a <strong>${fmt(tot.municipios_capacitacion_nucleo_acum)}</strong> municipios con capacitación en cumplimiento legal ambiental, sumando <strong>${fmt(tot.personas_capacitadas_nucleo_acum)}</strong> personas capacitadas en lo que va del año. Las asistencias técnicas superaron ya la meta anual.`,
  };
  const narrativa=narrativas[p]||`Seguimiento del período ${mesLabel} del Programa de Fortalecimiento Municipal de AALA.`;

  // Stats del hero
  const reunAcum=+tot.reuniones_totales_acum||0;
  const pirdesAcum=+tot.pirdes_implementados_acum||0;
  const asistAcum=+tot.asistencias_priorizadas_proxy_acum||0;

  // KPI cards primarios
  const kpiHTML=indsPrim.map(ind=>buildKpiCard(ind,inds,p,prevP)).join('');

  // Operativos de apoyo
  const opsHTML=buildOps(tot);

  // Gráfica de avance acumulado vs meta
  const grafAcumHTML=buildGrafAcum(indsPrim,p);

  // Capacitaciones por tema
  const temas=capTema.filter(r=>r.periodo===p);
  const grafTemasHTML=buildGrafTemas(temas);

  // Asistencias por sector
  const asist=asistSector.filter(r=>r.periodo===p);
  const grafAsistHTML=buildGrafAsist(asist);

  // Reuniones por tipo
  const reun=reunTipo.filter(r=>r.periodo===p);
  const grafReunHTML=buildGrafReun(reun);

  // Municipios
  const munis=capMuni.filter(r=>r.periodo===p);
  const munisHTML=buildMunis(munis);

  // Alertas
  const alertasHTML=buildAlertas(indsPrim, tot, totPrev, p);

  return `
<!-- HERO -->
<section class="hero s1">
  <article class="card hero-main">
    <div class="program-eyebrow">Programa de Fortalecimiento Municipal · AALA</div>
    <h1>Avanzamos juntos hacia municipios más fuertes</h1>
    <p class="hero-narrative">${narrativa}</p>
    <div class="hero-stats">
      <span class="hero-stat-pill">Corte <strong>${mesLabel}</strong></span>
      <span class="hero-stat-pill"><strong>${fmt(reunAcum)}</strong> reuniones acumuladas</span>
      <span class="hero-stat-pill"><strong>${fmt(pirdesAcum)}</strong> PIRDES implementados</span>
      <span class="hero-stat-pill"><strong>${fmt(asistAcum)}</strong> asistencias técnicas</span>
    </div>
  </article>

  <aside class="card hero-side s2">
    <div class="gauge-label-top">Avance anual · Personas capacitadas</div>
    <div class="gauge-wrap">
      <svg class="gauge-svg" width="120" height="120" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3d7dd4"/>
            <stop offset="100%" stop-color="#1a4a8a"/>
          </linearGradient>
        </defs>
        <circle class="gauge-track" cx="50" cy="50" r="40"/>
        <circle class="gauge-fill" id="gaugeFill" cx="50" cy="50" r="40"/>
        <text class="gauge-center-value" id="gaugeVal" x="50" y="46">0%</text>
        <text class="gauge-center-label" x="50" y="60">del año</text>
      </svg>
    </div>
    <div class="gauge-mini-list">
      ${indsPrim.filter(r=>r.meta_anual).map(ind=>`
      <div class="gauge-mini-item">
        <span class="gauge-mini-lbl">${esc(ind.indicador_nombre.split('/')[0].trim().replace('Municipios alcanzados por capacitaciones núcleo','Municipios').replace('Personas capacitadas en temas núcleo','Personas cap.').replace('Asistencias técnicas priorizadas de agua y saneamiento (proxy operativo)','Asistencias').replace('Estudios de residuos sólidos sector comercial / mercados finalizados','Estudios RS').replace('PIRDES implementados','PIRDEs').replace('Reuniones del eje de agua y saneamiento / CODEMA','Reun. CODEMA').replace('Mesas técnicas departamentales de agua y saneamiento','Mesas dept.'))}</span>
        <span class="gauge-mini-val">${fmt(+ind.valor_acumulado||0)} / ${fmt(+ind.meta_anual||0)}</span>
      </div>`).join('')}
    </div>
  </aside>
</section>

<!-- KPI PRIMARIOS -->
<section class="section s3">

/* ── KPI Card ── */
function buildKpiCard(ind, inds, p, prevP){
  const val=+ind.valor_acumulado||0;
  const meta=+ind.meta_anual||0;
  const pctAnual=meta?val/meta:0;

  // pct_cohorte = avance vs lo esperado al corte del período (no vs meta anual completa)
  // Esto es lo que define el semáforo — si vas al ritmo correcto para el mes en que estás
  const pctCohorte=+ind.pct_cohorte||0;
  const metaCohorte=+ind.meta_cohorte||0;

  // Semáforo basado en ritmo al corte, no en % del año completo
  const sem=semaforo(Math.min(pctCohorte, 1.5));

  // Si supera la meta ANUAL completa (no solo el cohorte)
  const metaAnualSuperada=meta>0&&val>=meta;

  // Delta mensual
  const valMes=+ind.valor_mes||0;
  let deltaHTML='';
  if(valMes>0){
    deltaHTML=`<span class="delta sube">+${fmt(valMes)} este mes</span>`;
  }

  // Barra visual: muestra avance anual (cap 100%) con ritmo esperado al corte
  const wEsp=Math.min((metaCohorte/meta)*100, 100);
  const wReal=Math.min(pctAnual*100, 100);

  const nombre=ind.indicador_nombre.replace('(proxy operativo)','').trim();
  const unidad=ind.unidad||'';

  // Texto inferior — muestra acumulado vs meta anual, nunca el %
  let metaTxt='';
  if(!meta){
    metaTxt=`<span>Acum. <strong>${fmt(val)}</strong> ${esc(unidad)}</span><span style="color:var(--muted)">Sin meta anual</span>`;
  } else if(metaAnualSuperada){
    metaTxt=`<span>Acum. <strong>${fmt(val)}</strong> / meta <strong>${fmt(meta)}</strong> ${esc(unidad)}</span><span style="color:var(--al-dia);font-weight:700">✓ Meta anual alcanzada</span>`;
  } else {
    metaTxt=`<span>Acum. <strong>${fmt(val)}</strong> de <strong>${fmt(meta)}</strong> ${esc(unidad)}</span><span style="color:var(--muted)">Meta esperada al corte: ${fmt(metaCohorte,1)}</span>`;
  }

  // Nota para indicadores que superan la meta cohorte ampliamente
  let notaPrudente='';
  if(metaAnualSuperada){
    notaPrudente=`<div class="kpi-nota-proxy">La meta anual ya fue superada. El programa puede haber concentrado actividad en este período o la meta fue definida como mínimo referencial.</div>`;
  } else if(pctCohorte>2){
    notaPrudente=`<div class="kpi-nota-proxy">El ritmo acumulado supera ampliamente lo esperado para este punto del año. Puede reflejar concentración de actividad o ajuste de meta.</div>`;
  }

  // Construir datos para modal
  const modalData={
    nombre, val, meta, pctAnual, pctCohorte, metaCohorte, valMes, unidad,
    sem: sem.cls, semLabel: sem.label, mesNum: +p.split('-')[1],
    superada: metaAnualSuperada,
    indicador_id: ind.indicador_id||'',
    // Historial de acumulados para mini gráfica en modal
    historico: inds.filter(r=>r.indicador_id===ind.indicador_id)
      .sort((a,b)=>+a.mes_num-+b.mes_num)
      .map(r=>({mes:r.mes_nombre, acum:+r.valor_acumulado||0, cohorte:+r.meta_cohorte||0}))
  };

  return `
<article class="card kpi-card ${sem.cls}" style="cursor:pointer" onclick="openKpiModal(${JSON.stringify(modalData).replace(/"/g,'&quot;')})">
  <div class="kpi-top">
    <div class="kpi-nombre">${esc(nombre)}</div>
    <span class="sem ${sem.cls}">${sem.label}</span>
  </div>
  <div class="kpi-valor" data-to="${val}">${fmt(val)}</div>${deltaHTML}
  <div class="kpi-unidad">${esc(unidad)} acumulados al corte</div>
  <div class="kpi-barra-wrap" title="Barra llena = ritmo esperado al corte · Barra azul = avance real">
    <div class="kpi-barra-esperado" style="width:${wEsp}%"></div>
    <div class="kpi-barra-real ${sem.cls}" style="width:${wReal}%"></div>
  </div>
  <div class="kpi-meta-txt">${metaTxt}</div>
  ${notaPrudente}
  <div class="kpi-zoom-hint">Clic para ver detalle ↗</div>
</article>`;
}

/* ── Gráfica barras horizontales avance acumulado ── */
function buildGrafAcum(indsPrim,p){
  const datos=indsPrim.filter(r=>r.meta_anual&&+r.meta_anual>0);
  if(!datos.length) return '<p class="panel-sub">Sin datos para este período.</p>';
  const barH=22, gap=50, pad=2;
  const h=datos.length*gap+pad*2+10;
  const W=500, trackW=W-190, labelX=190;
  let svgBars='';
  const colorMap={'al-dia':'#157a50','seguimiento':'#8a6200','rezago':'#c94747','sin-actividad':'#9aaac0'};

  datos.forEach((ind,i)=>{
    const y=i*gap+pad;
    const pctAnualRaw=+ind.pct_meta_anual||0;
    const pctCohorte=+ind.pct_cohorte||0;
    const metaCohorte=+ind.meta_cohorte||0;
    const metaAnual=+ind.meta_anual||0;
    const metaSuperada=pctAnualRaw>=1;
    // Barra visual: siempre cap en 100%
    const pctVis=Math.min(pctAnualRaw,1);
    const wReal=pctVis*trackW;
    // Esperado = meta cohorte / meta anual (no simple mes/12)
    const wEsp=metaAnual?(Math.min(metaCohorte/metaAnual,1)*trackW):0;
    // Semáforo basado en ritmo al corte
    const sem=semaforo(Math.min(pctCohorte,1.5));
    const col=colorMap[sem.cls]||'#2060b8';

    // Label corto
    const nombre=ind.indicador_nombre
      .replace('(proxy operativo)','')
      .replace(' de agua y saneamiento / CODEMA','')
      .replace(' de agua y saneamiento','')
      .replace('sector comercial / mercados finalizados','')
      .trim();
    const labelShort=nombre.length>26?nombre.slice(0,24)+'…':nombre;

    // Etiqueta de porcentaje — texto prudente si superó meta
    const pctLabel=metaSuperada?'Meta ✓':`${fmt(pctAnualRaw*100,0)}%`;
    const pctColor=metaSuperada?'#157a50':col;

    svgBars+=`
    <g class="bar-group" style="cursor:pointer"
       data-ind="${esc(ind.indicador_nombre)}"
       data-val="${fmt(+ind.valor_acumulado)} ${esc(ind.unidad||'')}"
       data-meta="${fmt(+ind.meta_anual)} ${esc(ind.unidad||'')}"
       data-pct="${metaSuperada?'✓ Meta anual alcanzada':'Avance anual: '+fmt(pctAnualRaw*100,0)+'% · Ritmo al corte: '+fmt(pctCohorte*100,0)+'%'}"
       data-sem="${metaSuperada?'Al día':sem.label}">
      <text x="0" y="${y+barH/2}" dominant-baseline="central"
        style="font-size:10.5px;fill:#2a4570;font-family:'Sora',sans-serif">${esc(labelShort)}</text>
      <rect x="${labelX}" y="${y}" width="${trackW}" height="${barH}" rx="5" fill="#ddeaf8"/>
      <rect x="${labelX}" y="${y}" width="${wEsp}" height="${barH}" rx="5"
        fill="none" stroke="#9ab8d8" stroke-width="1.5" stroke-dasharray="4 3"/>
      <rect x="${labelX}" y="${y}" width="${wReal}" height="${barH}" rx="5"
        fill="${col}" opacity="${metaSuperada?0.75:0.85}"/>
      ${metaSuperada?`<text x="${labelX+wReal-6}" y="${y+barH/2}" dominant-baseline="central" text-anchor="end"
        style="font-size:9px;font-weight:700;fill:#fff;font-family:'JetBrains Mono',monospace">✓ META</text>`:''}
      <text x="${labelX+wReal+7}" y="${y+barH/2}" dominant-baseline="central"
        style="font-size:10px;font-weight:700;fill:${pctColor};font-family:'JetBrains Mono',monospace">${pctLabel}</text>
    </g>`;
  });

  return `<svg viewBox="0 0 ${W} ${h}" style="overflow:visible;width:100%">${svgBars}</svg>`;
}

/* ── Gráfica temas ── */
function buildGrafTemas(temas){
  if(!temas.length) return '<p class="panel-sub" style="margin-top:8px">Sin capacitaciones registradas este período.</p>';
  const maxP=Math.max(...temas.map(r=>+r.personas||0));
  const h=temas.length*44+10;
  const W=400;
  let svg='';
  temas.forEach((t,i)=>{
    const label=String(t.tema||'').length>30?String(t.tema).slice(0,28)+'…':String(t.tema);
    const w=maxP?((+t.personas||0)/maxP)*(W-170):0;
    const isNucleo=String(t.es_tema_nucleo).toLowerCase()==='true';
    svg+=`
    <g class="bar-group" data-ind="${esc(t.tema)}" data-val="${fmt(+t.personas)} personas" data-meta="${esc(t.eventos)} eventos" data-pct="${isNucleo?'Tema núcleo':'Complementario'}" data-sem="${isNucleo?'Al día':'Sin actividad'}">
      <text x="0" y="${i*44+19}" dominant-baseline="central" style="font-size:10.5px;fill:var(--text-2);font-family:var(--font-body)">${esc(label)}</text>
      <rect x="170" y="${i*44+8}" width="${W-170}" height="20" rx="4" fill="var(--line-soft)"/>
      <rect x="170" y="${i*44+8}" width="${w}" height="20" rx="4" fill="${isNucleo?'#2060b8':'#5a8fc8'}" opacity=".8"/>
      <text x="${170+w+5}" y="${i*44+19}" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#2060b8;font-family:var(--font-mono)">${fmt(+t.personas)}</text>
    </g>`;
  });
  return `<svg viewBox="0 0 ${W} ${h}" style="overflow:visible;width:100%">${svg}</svg>`;
}

/* ── Gráfica reuniones ── */
function buildGrafReun(reun){
  if(!reun.length) return '<p class="panel-sub" style="margin-top:8px">Sin reuniones en este período.</p>';
  const total=reun.reduce((s,r)=>s+(+r.reuniones||0),0);
  const W=400, cxBase=120, cy=90, r=70;
  const cols=['#1a4a8a','#2060b8','#3d7dd4','#6aa4e8'];
  let startAngle=-Math.PI/2;
  let paths='';
  let legend='';
  reun.forEach((row,i)=>{
    const val=+row.reuniones||0;
    const angle=(val/total)*Math.PI*2;
    const x1=cxBase+r*Math.cos(startAngle);
    const y1=cy+r*Math.sin(startAngle);
    const x2=cxBase+r*Math.cos(startAngle+angle);
    const y2=cy+r*Math.sin(startAngle+angle);
    const large=angle>Math.PI?1:0;
    paths+=`<path class="bar-group" d="M${cxBase},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z"
      fill="${cols[i%cols.length]}" opacity=".85"
      data-ind="${esc(row.tipo_reunion)}" data-val="${val} reuniones" data-meta="" data-pct="${Math.round(val/total*100)}% del total" data-sem="Al día"/>`;
    legend+=`<g>
      <rect x="${W-210}" y="${i*22}" width="12" height="12" rx="2" fill="${cols[i%cols.length]}"/>
      <text x="${W-193}" y="${i*22+10}" style="font-size:10.5px;fill:var(--text-2);font-family:var(--font-body)">${esc(String(row.tipo_reunion||'').slice(0,22))} (${val})</text>
    </g>`;
    startAngle+=angle;
  });
  return `<svg viewBox="0 0 ${W} 195" style="overflow:visible;width:100%">
    <text x="${cxBase}" y="${cy}" text-anchor="middle" dominant-baseline="central" style="font-size:22px;font-weight:500;fill:var(--text);font-family:var(--font-mono)">${total}</text>
    <text x="${cxBase}" y="${cy+20}" text-anchor="middle" style="font-size:10px;fill:var(--muted);font-family:var(--font-body)">reuniones</text>
    ${paths}
    <g transform="translate(0,16)">${legend}</g>
  </svg>`;
}

/* ── Alertas unificadas ── */
function buildAlertas(indsPrim, tot, totPrev, p){
  const alertas=[];

  indsPrim.filter(r=>r.meta_anual).forEach(ind=>{
    const pct=Math.min(+ind.pct_cohorte||0, 2);
    const pctAnual=+ind.pct_meta_anual||0;
    const sem=semaforo(Math.min(pct,1.5));
    const nombre=ind.indicador_nombre.replace('(proxy operativo)','').trim().replace(' de agua y saneamiento / CODEMA','');

    if(pct>=1.5){
      alertas.push({cls:'al-dia', icon:'🏆',
        txt:`<strong>${esc(nombre)}</strong> supera ampliamente su meta anual con un ${fmt(pct*100,0)}% de avance. Un logro que vale reconocer.`});
    } else if(pct>=1){
      alertas.push({cls:'al-dia', icon:'✅',
        txt:`<strong>${esc(nombre)}</strong> alcanzó su meta anual acumulada (${fmt(pct*100,0)}%). El ritmo es el correcto.`});
    } else if(sem.cls==='seguimiento'){
      alertas.push({cls:'seguimiento', icon:'👀',
        txt:`<strong>${esc(nombre)}</strong> avanza en seguimiento — ${fmt(pctAnual*100,0)}% de la meta anual. Mantener el ritmo para no quedar atrás.`});
    } else if(sem.cls==='rezago'){
      alertas.push({cls:'rezago', icon:'⚠️',
        txt:`<strong>${esc(nombre)}</strong> está en rezago con ${fmt(pctAnual*100,0)}% de la meta anual acumulado. Priorizar en la próxima planificación operativa.`});
    } else if(sem.cls==='sin-actividad'){
      alertas.push({cls:'informacion', icon:'📋',
        txt:`<strong>${esc(nombre)}</strong> aún no registra avance acumulado. Sin actividad registrada en los meses reportados.`});
    }
  });

  if(!alertas.length){
    alertas.push({cls:'al-dia', icon:'✅', txt:'No se detectan rezagos en los indicadores estratégicos del período.'});
  }

  return alertas.map(a=>`
    <div class="alerta ${a.cls}">
      <span class="alerta-icon">${a.icon}</span>
      <span>${a.txt}</span>
    </div>`).join('');
}

/* ── Tooltips en gráficas ── */
function attachTooltips(){
  document.querySelectorAll('.bar-group').forEach(el=>{
    el.style.cursor='pointer';
    el.addEventListener('mouseenter',e=>{
      const ind=el.dataset.ind||'';
      const val=el.dataset.val||'';
      const meta=el.dataset.meta||'';
      const pct=el.dataset.pct||'';
      const sem=el.dataset.sem||'';
      const semCls={
        'Al día':'al-dia','En seguimiento':'seguimiento',
        'Rezago':'rezago','Sin actividad':'sin-actividad','Tema núcleo':'al-dia'
      }[sem]||'sin-actividad';
      showTip(e,`<strong>${esc(ind)}</strong><br>
        ${val?`Valor: <strong>${esc(val)}</strong><br>`:''}
        ${meta?`Meta: ${esc(meta)}<br>`:''}
        ${pct?`Avance: <strong>${esc(pct)}</strong><br>`:''}
        ${sem?`<span class="t-sem ${semCls}">${esc(sem)}</span>`:''}`);
    });
    el.addEventListener('mouseleave',hideTip);
  });

  // Click en panel de gráfica → modal zoom
  document.querySelectorAll('.chart-host').forEach(host=>{
    const panel=host.closest('.panel');
    if(!panel) return;
    const title=panel.querySelector('h3')?.textContent||'';
    const sub=panel.querySelector('.panel-sub')?.textContent||'';
    host.addEventListener('click',e=>{
      if(e.target.closest('.bar-group')) return; // no doble
      openChartModal(title, sub, host.innerHTML);
    });
  });
}

/* ── MODAL KPI ── */
function openKpiModal(dataAttr){
  let d;
  if(typeof dataAttr === 'string'){
    try{ d=JSON.parse(dataAttr.replace(/&quot;/g,'"')); }catch(e){ return; }
  } else { d=dataAttr; }

  document.getElementById('modalTitle').textContent=d.nombre||'Indicador';

  const semCls=d.sem||'sin-actividad';
  const pctAnualDisplay=d.pctAnual!=null?`${Math.round((d.pctAnual||0)*100)}%`:'—';
  const pctCohorteDisplay=d.pctCohorte!=null?`${Math.round((d.pctCohorte||0)*100)}%`:'—';

  // Mini gráfica histórica SVG
  let histSVG='<p style="color:var(--muted);font-size:.82rem">Sin datos históricos disponibles.</p>';
  if(d.historico&&d.historico.length>0){
    const maxAcum=Math.max(...d.historico.map(h=>h.acum),d.meta||1);
    const W=480, H=80, pad=30;
    const barW=Math.min(60, (W-pad*2)/d.historico.length - 8);
    const spacing=(W-pad*2)/d.historico.length;
    const colores={'al-dia':'#157a50','seguimiento':'#8a6200','rezago':'#c94747','sin-actividad':'#9aaac0'};
    const barCol=colores[semCls]||'#2060b8';
    let bars='';
    let metaLine='';

    if(d.meta>0){
      const yMeta=H - (d.meta/maxAcum)*(H-8);
      metaLine=`<line x1="${pad}" y1="${yMeta}" x2="${W-pad}" y2="${yMeta}" stroke="#c94747" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
      <text x="${W-pad+3}" y="${yMeta+4}" style="font-size:9px;fill:#c94747;font-family:'JetBrains Mono',monospace">Meta</text>`;
    }

    d.historico.forEach((h,i)=>{
      const x=pad+i*spacing+spacing/2-barW/2;
      const barH_=maxAcum>0?Math.max((h.acum/maxAcum)*(H-8),2):2;
      const y=H-barH_;
      const isLatest=(i===d.historico.length-1);
      bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH_}" rx="3"
        fill="${barCol}" opacity="${isLatest?1:.55}"/>
        <text x="${x+barW/2}" y="${H+12}" text-anchor="middle"
          style="font-size:9px;fill:#6685aa;font-family:'Sora',sans-serif">${(h.mes||'').slice(0,3)}</text>
        <text x="${x+barW/2}" y="${y-4}" text-anchor="middle"
          style="font-size:8px;font-weight:700;fill:${barCol};font-family:'JetBrains Mono',monospace;display:${h.acum>0?'block':'none'}">${h.acum}</text>`;
    });

    histSVG=`<svg viewBox="0 0 ${W} ${H+20}" style="width:100%;overflow:visible">
      ${metaLine}${bars}
    </svg>`;
  }

  const bodyHTML=`
    <div class="modal-kpi-hero">
      <div class="modal-kpi-val">${Math.round(d.val||0)}</div>
      <div class="modal-kpi-unit">${d.unidad||''} acumulados</div>
      <span class="sem ${semCls}" style="margin-left:8px">${d.semLabel||''}</span>
    </div>

    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-lbl">Meta anual total</div>
        <div class="modal-stat-val">${d.meta?Math.round(d.meta):'Sin meta'} ${d.unidad||''}</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Avance del año</div>
        <div class="modal-stat-val">${pctAnualDisplay}</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Meta esperada al corte</div>
        <div class="modal-stat-val">${d.metaCohorte?d.metaCohorte.toFixed(1):'—'} ${d.unidad||''}</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-lbl">Ritmo al corte</div>
        <div class="modal-stat-val">${pctCohorteDisplay} del esperado</div>
      </div>
    </div>

    ${d.superada?`<div class="kpi-nota-proxy" style="margin-bottom:14px">
      La meta anual ya fue alcanzada en este punto del año. El ritmo de avance supera lo planificado.
    </div>`:''}

    <div class="modal-hist">
      <div class="modal-hist-title">Evolución acumulada del indicador</div>
      ${histSVG}
    </div>
  `;

  document.getElementById('modalBody').innerHTML=bodyHTML;
  document.getElementById('kpiModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeKpiModal(e){
  if(e.target===document.getElementById('kpiModal')) closeKpiModalDirect();
}
function closeKpiModalDirect(){
  document.getElementById('kpiModal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeKpiModalDirect(); });

/* ── ARRANCAR ── */
init();

function openChartModal(title, sub, svgOrHTML){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalSub').textContent=sub;
  document.getElementById('modalBody').innerHTML=`<div style="padding:8px 0">${svgOrHTML}</div>`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){
  if(e.target===document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModalDirect(); });

</script>

<!-- MODAL ZOOM -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div class="modal-sub" id="modalSub">—</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

</body>
</html>
