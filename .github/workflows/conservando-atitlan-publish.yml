name: Sync Conservando Atitlán desde Kobo

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: conservando-atitlan-sync
  cancel-in-progress: false

jobs:
  sync-conservando-atitlan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl

      - name: Create folders
        run: |
          mkdir -p data_raw/conservando_atitlan
          mkdir -p data_processed/conservando_atitlan
          mkdir -p docs/data/conservando_atitlan

      - name: Read Kobo export
        env:
          KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
          KOBO_ASSET_UID: ${{ secrets.KOBO_ASSET_UID }}
          KOBO_EXPORT_NAME: ${{ secrets.KOBO_EXPORT_NAME }}
          KOBO_BASE_URL: https://kf.kobotoolbox.org
        run: python scripts/read_kobo_conservando.py

      - name: Transform Conservando Atitlán
        run: python scripts/transform_conservando_atitlan.py

      - name: Copy published CSVs
        run: |
          cp data_processed/conservando_atitlan/total_mes.csv docs/data/conservando_atitlan/
          cp data_processed/conservando_atitlan/institucional_indicadores.csv docs/data/conservando_atitlan/
          cp data_processed/conservando_atitlan/jornadas_detalle.csv docs/data/conservando_atitlan/
          cp data_processed/conservando_atitlan/produccion_detalle.csv docs/data/conservando_atitlan/
          cp data_processed/conservando_atitlan/ventas_detalle.csv docs/data/conservando_atitlan/
          cp data_processed/conservando_atitlan/actividades_detalle.csv docs/data/conservando_atitlan/

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/conservando_atitlan/
          git add data_processed/conservando_atitlan/
          git add docs/data/conservando_atitlan/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Conservando Atitlán data from Kobo"
            git push
          fi

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v6
        with:
          name: raw-conservando-atitlan
          path: data_raw/conservando_atitlan/*
          if-no-files-found: error

      - name: Upload processed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: processed-conservando-atitlan
          path: data_processed/conservando_atitlan/*.csv
          if-no-files-found: error
