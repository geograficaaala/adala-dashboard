name: Fortalecimiento Municipal Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      SHEET_ID_FORTALECIMIENTO_MUNICIPAL: ${{ secrets.SHEET_ID_FORTALECIMIENTO_MUNICIPAL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ensure folders exist
        run: |
          mkdir -p data_raw/fortalecimiento_municipal
          mkdir -p data_processed/fortalecimiento_municipal
          mkdir -p docs/data/fortalecimiento_municipal

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          ls -la scripts || true

      - name: Read Google Sheet
        run: python scripts/read_sheets_fortalecimiento.py

      - name: Transform raw data
        run: python scripts/transform_fortalecimiento_municipal.py

      - name: Copy processed data to docs
        run: |
          cp -f data_processed/fortalecimiento_municipal/*.csv docs/data/fortalecimiento_municipal/ || true

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortalecimiento-municipal-raw
          path: data_raw/fortalecimiento_municipal/

      - name: Upload processed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortalecimiento-municipal-processed
          path: data_processed/fortalecimiento_municipal/

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/fortalecimiento_municipal data_processed/fortalecimiento_municipal docs/data/fortalecimiento_municipal
          git diff --cached --quiet || git commit -m "Update Fortalecimiento Municipal data"
          git push
