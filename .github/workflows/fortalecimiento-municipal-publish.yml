name: "Fortalecimiento Municipal - Publicar datos"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      KOBO_FM_TOKEN: ${{ secrets.KOBO_FM_TOKEN }}
      KOBO_FM_ASSET_UID: ${{ secrets.KOBO_FM_ASSET_UID }}
      KOBO_FM_EXPORT_NAME: ${{ secrets.KOBO_FM_EXPORT_NAME }}
      KOBO_BASE_URL: https://kf.kobotoolbox.org

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Create folders
        run: |
          mkdir -p data_raw/fortalecimiento_municipal
          mkdir -p data_processed/fortalecimiento_municipal
          mkdir -p docs/data/fortalecimiento_municipal

      - name: Read Kobo export
        run: python scripts/read_kobo_fortalecimiento.py

      - name: Transform raw data
        run: python scripts/transform_fortalecimiento_municipal.py

      - name: Publish CSV to docs/data
        run: |
          cp data_processed/fortalecimiento_municipal/*.csv docs/data/fortalecimiento_municipal/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fortalecimiento-municipal-data
          path: |
            data_raw/fortalecimiento_municipal/
            data_processed/fortalecimiento_municipal/
          if-no-files-found: warn

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/fortalecimiento_municipal/ data_processed/fortalecimiento_municipal/ docs/data/fortalecimiento_municipal/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Actualizar datos de Fortalecimiento Municipal"
            git push
          fi
