        ])
    out = df.copy()
    out = attach_period(out, main_df)
    keep = [
        "periodo_clave", "anio_reportado", "mes_num", "mes_label", "fecha_capacitacion", "municipios_capacitacion",
        "modalidad_capacitacion", "tipo_capacitacion", "temas_capacitacion", "participantes_total",
