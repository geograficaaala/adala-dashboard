name: "Educando para Conservar - Sync Kobo"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write

jobs:
  sync-kobo:
    runs-on: ubuntu-latest
    env:
      KOBO_EPC_TOKEN: ${{ secrets.KOBO_EPC_TOKEN }}
      KOBO_EPC_ASSET_UID: ${{ secrets.KOBO_EPC_ASSET_UID }}
      KOBO_EPC_EXPORT_NAME: ${{ secrets.KOBO_EPC_EXPORT_NAME }}
      KOBO_BASE_URL: https://kf.kobotoolbox.org

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create folders
        run: |
          mkdir -p data_raw/educando_para_conservar

      - name: Read Kobo export
        run: python scripts/read_kobo_epc.py

      - name: Upload raw artifact
        uses: actions/upload-artifact@v6
        with:
          name: educando-para-conservar-raw
          path: |
            data_raw/educando_para_conservar/
          if-no-files-found: warn

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/educando_para_conservar/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Actualizar raw de Educando para Conservar"
            git push
          fi
