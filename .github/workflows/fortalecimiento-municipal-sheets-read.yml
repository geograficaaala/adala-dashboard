name: "Fortalecimiento Municipal - Leer Google Sheets"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "41 * * * *"

permissions:
  contents: write

concurrency:
  group: fortalecimiento-municipal-sheets-read
  cancel-in-progress: false

jobs:
  read-sheets:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      SHEET_ID_FORTALECIMIENTO_MUNICIPAL: ${{ secrets.SHEET_ID_FORTALECIMIENTO_MUNICIPAL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create raw folder
        run: mkdir -p data_raw/fortalecimiento_municipal

      - name: Read Fortalecimiento Municipal sheet
        run: python scripts/read_sheets_fortalecimiento.py

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fortalecimiento-municipal-raw-sheets
          path: |
            data_raw/fortalecimiento_municipal/*.csv
            data_raw/fortalecimiento_municipal/manifest.json
          if-no-files-found: error

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/fortalecimiento_municipal/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Actualizar raw de Fortalecimiento Municipal desde Google Sheets"
            git pull --rebase origin main
            git push
          fi
