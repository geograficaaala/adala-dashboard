name: Test read Google Sheets

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-read:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p data_raw/atitlan_recicla
          mkdir -p data_processed/atitlan_recicla
          mkdir -p docs/data

      - name: Read sheets
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_ID_CDM_ATITLAN: ${{ secrets.SHEET_ID_CDM_ATITLAN }}
          SHEET_ID_MATERIALES_ATITLAN: ${{ secrets.SHEET_ID_MATERIALES_ATITLAN }}
        run: python scripts/test_read_sheets.py

      - name: Transform Atitlán Recicla
        run: python scripts/transform_atitlan_recicla.py

      - name: Copy published dashboard CSVs
        run: |
          cp data_processed/atitlan_recicla/institucional_indicadores.csv docs/data/
          cp data_processed/atitlan_recicla/total_mes.csv docs/data/
          cp data_processed/atitlan_recicla/zona_mes.csv docs/data/
          cp data_processed/atitlan_recicla/materiales_resumen_mes.csv docs/data/
          cp data_processed/atitlan_recicla/territorio_mes.csv docs/data/

      - name: Commit updated dashboard CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update dashboard CSVs from workflow"
            git push
          fi

      - name: Upload raw CSV artifacts
        uses: actions/upload-artifact@v6
        with:
          name: raw-csv-atitlan
          path: data_raw/atitlan_recicla/*.csv

      - name: Upload processed CSV artifacts
        uses: actions/upload-artifact@v6
        with:
          name: processed-csv-atitlan
          path: data_processed/atitlan_recicla/*.csv
