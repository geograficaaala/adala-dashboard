name: Kobo Sync Conservando Atitlán

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync-kobo-conservando:
    runs-on: ubuntu-latest
    env:
      KOBO_TOKEN: ${{ secrets.KOBO_TOKEN }}
      KOBO_ASSET_UID: ${{ secrets.KOBO_ASSET_UID }}
      KOBO_EXPORT_NAME: ${{ secrets.KOBO_EXPORT_NAME }}
      KOBO_BASE_URL: https://kf.kobotoolbox.org

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create raw data folder
        run: mkdir -p data_raw/conservando_atitlan

      - name: Read named export from Kobo
        run: python scripts/read_kobo_conservando.py

      - name: Upload raw artifact
        uses: actions/upload-artifact@v4
        with:
          name: conservando-atitlan-kobo-raw
          path: data_raw/conservando_atitlan/
          if-no-files-found: error

      - name: Commit raw updates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/conservando_atitlan/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Actualizar raw de Kobo - Conservando Atitlán"
            git push
          fi
