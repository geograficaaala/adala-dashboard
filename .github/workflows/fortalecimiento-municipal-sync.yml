name: Fortalecimiento Municipal - Sync Kobo Raw

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  sync-kobo-raw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Preparar carpetas
        run: |
          mkdir -p data_raw/fortalecimiento_municipal

      - name: Descargar raw desde Kobo
        env:
          KOBO_FM_TOKEN: ${{ secrets.KOBO_FM_TOKEN }}
          KOBO_FM_ASSET_UID: ${{ secrets.KOBO_FM_ASSET_UID }}
          KOBO_FM_EXPORT_NAME: ${{ secrets.KOBO_FM_EXPORT_NAME }}
          KOBO_BASE_URL: https://kf.kobotoolbox.org
        run: |
          python scripts/read_kobo_fortalecimiento.py

      - name: Subir artifact raw
        uses: actions/upload-artifact@v6
        with:
          name: fortalecimiento-municipal-raw
          path: data_raw/fortalecimiento_municipal/
          if-no-files-found: error

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_raw/fortalecimiento_municipal/
          if git diff --cached --quiet; then
            echo "Sin cambios para commit"
          else
            git commit -m "Actualizar raw de Kobo - Fortalecimiento Municipal"
            git push
          fi
