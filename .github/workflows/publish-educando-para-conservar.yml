name: Publish Educando para Conservar

on:
  workflow_dispatch:
  schedule:
    - cron: "20 11 * * *"   # diario 05:20 Guatemala

permissions:
  contents: write

jobs:
  publish-epc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p data_raw/educando_para_conservar
          mkdir -p data_processed/educando_para_conservar
          mkdir -p docs/data/educando_para_conservar

      - name: Read EPC sheet
        env:
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_ID_EDUCANDO_PARA_CONSERVAR: ${{ secrets.SHEET_ID_EDUCANDO_PARA_CONSERVAR }}
        run: python scripts/read_educando_para_conservar.py

      - name: Transform EPC data
        run: python scripts/transform_educando_para_conservar.py

      - name: Commit published CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/educando_para_conservar/*.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Educando para Conservar dashboard CSVs"
            git push
          fi

      - name: Upload raw CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raw-csv-epc
          path: data_raw/educando_para_conservar/*

      - name: Upload processed CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-csv-epc
          path: data_processed/educando_para_conservar/*.csv
